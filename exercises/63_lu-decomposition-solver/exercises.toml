═══════════════════════════════════════
LU 分解的数据布局（ In-Place ）
═══════════════════════════════════════

为节省内存， L 和 U 通常存储在同一个矩阵中:

  A (分解后):
  ┌───────────────────┐
  │ u₀₀   u₀₁   u₀₂  │  ← U 的上三角部分
  │ l₁₀   u₁₁   u₁₂  │
  │ l₂₀   l₂₁   u₂₂  │  ← L 的严格下三角部分
  └───────────────────┘

  L 的对角线全为 1 （不存储）。
  提取时: i>j 部分属于 L, i≤j 部分属于 U 。

═══════════════════════════════════════
常见错误
═══════════════════════════════════════

1. pivot 只交换部分列:
   必须交换整行（所有 N 列），不仅仅是第 k 列之后的。
   因为之前列中存储的 L 乘数也需要交换。

2. 忘记更新排列向量 p:
   p 记录了行的最终排列，前向替换时需要用它来排列 b 。

3. 提取 L/U 时对角线搞反:
   L[i][i] = 1 (不是 A[i][i])， U[i][i] = A[i][i]。
   常见错误: 把对角线元素同时放入 L 和 U 。

4. 前向替换忘记先排列 b:
   必须先用 p 排列 b 得到 Pb ，再解 Ly = Pb 。
   不能直接在原始 b 上做前向替换。

5. 后向替换忘记除以 U[i][i]:
   x[i] = (y[i] - sum) / U[i][i] ← 除法容易遗漏。

6. 浮点比较用 ==:
   验证时用格式 "%8.4f" 打印比较，不要用 == 判断相等。

7. 忘记 -lm 链接:
   fabs() 在 math.h 中，编译时需要 -lm 。

8. pivot 中 max_val 初始化:
   必须初始化为 fabs(A[k][k])，不是 0 。
   否则如果所有元素为负， max_val=0 永远不会更新。

═══════════════════════════════════════
