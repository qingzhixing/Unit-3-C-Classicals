hint = '''
矩阵 LU 分解求解器: 用带部分主元的 LU 分解求解 3×3 线性方程组 Ax = b 。

═══════════════════════════════════════
背景: 线性方程组与 LU 分解
═══════════════════════════════════════

线性方程组 Ax = b 是科学计算中最基本的问题之一。直接求逆矩阵
A⁻¹ 在数值上不稳定且计算量大。 LU 分解将 A 分解为下三角矩阵 L 和
上三角矩阵 U 的乘积，然后通过两次三角求解得到答案。

LU 分解的历史:
  - 1954 年， Alan Turing 在论文中首次描述了 LU 分解
  - 部分主元 (partial pivoting) 由 Wilkinson 在 1960 年代推广
  - 至今仍是 LAPACK/BLAS 等数值库的核心算法

═══════════════════════════════════════
LU 分解原理
═══════════════════════════════════════

给定方阵 A ，寻找下三角矩阵 L 和上三角矩阵 U ，使得:

  PA = LU

其中 P 是置换矩阵（记录行交换）， L 的对角线全为 1 （单位下三角），
U 是对角线非零的上三角矩阵。

对于 3×3 矩阵:

  A = [a₁₁ a₁₂ a₁₃]   L = [1   0   0]   U = [u₁₁ u₁₂ u₁₃]
      [a₂₁ a₂₂ a₂₃]       [l₂₁ 1   0]       [0   u₂₂ u₂₃]
      [a₃₁ a₃₂ a₃₃]       [l₃₁ l₃₂ 1]       [0   0   u₃₃]

分解步骤（以本题为例， A={{2,1,1},{4,3,3},{8,7,9}}）:

  k=0: 选主元 — 第 0 列: |2|=2, |4|=4, |8|=8 → 最大 8 在第 2 行
       交换 row 0 ↔ row 2

       交换后 A = [[8, 7, 9],
                   [4, 3, 3],
                   [2, 1, 1]]

       消去: 对 i=1,2 计算乘数并消去
         l₁₀ = 4/8 = 0.5,  row₁ -= 0.5*row₀ → [0.5, -0.5, -1.5]
         l₂₀ = 2/8 = 0.25, row₂ -= 0.25*row₀ → [0.25, -0.75, -1.25]

  k=1: 选主元 — 第 1 列(i≥1): |-0.5|=0.5, |-0.75|=0.75 → 最大在第 2 行
       交换 row 1 ↔ row 2

       消去: l₂₁ = -0.5/(-0.75) = 0.6667
         row₂ -= 0.6667*row₁ → [0.5, 0.6667, -0.6667]

  提取 L 和 U:
    L = [[1,     0,      0    ],
         [0.25,  1,      0    ],
         [0.5,   0.6667, 1    ]]
    U = [[8,     7,      9    ],
         [0,    -0.75,  -1.25 ],
         [0,     0,     -0.6667]]

═══════════════════════════════════════
部分主元 (Partial Pivoting)
═══════════════════════════════════════

为什么需要选主元？考虑极端情况:

  [ε  1] [x₁] = [1]
  [1  1] [x₂]   [2]

如果 ε 非常小（如 1e-16 ），不选主元时:
  l₂₁ = 1/ε ≈ 1e16
  消去时产生灾难性抵消，结果完全错误。

部分主元策略:
  在第 k 步，从第 k 列的第 k 到 N-1 行中选择绝对值最大的元素
  作为主元，将该行交换到第 k 行。

  ┌────────────────────────────────────────┐
  │  k=0:  列 0, 选 max(|A[0][0]|,|A[1][0]|,|A[2][0]|) │
  │         → A[2][0]=8 最大, swap row0↔row2          │
  │                                                    │
  │  k=1:  列 1, 选 max(|A[1][1]|,|A[2][1]|)           │
  │         → A[2][1] 更大, swap row1↔row2            │
  └────────────────────────────────────────┘

选主元的好处:
  - 所有乘数 |l_ik| ≤ 1 （数值稳定）
  - 避免除以零（矩阵非奇异时保证可分解）
  - 减小舍入误差的放大

═══════════════════════════════════════
前向替换 (Forward Substitution)
═══════════════════════════════════════

求解 Ly = Pb ，其中 L 是单位下三角矩阵。

  y₀ = (Pb)₀
  y₁ = (Pb)₁ - l₁₀·y₀
  y₂ = (Pb)₂ - l₂₀·y₀ - l₂₁·y₁

一般公式:
  yᵢ = (Pb)ᵢ - Σ(j=0 to i-1) L[i][j]·yⱼ

计算复杂度: O(N²)

对于本题:
  p = [2, 0, 1], 所以 Pb = [b₂, b₀, b₁] = [29, 5, 11]

  y₀ = 29
  y₁ = 5 - 0.25×29 = 5 - 7.25 = -2.25
  y₂ = 11 - 0.5×29 - 0.6667×(-2.25) = 11 - 14.5 + 1.5 = -2.0

  y = [29, -2.25, -2.0]

═══════════════════════════════════════
后向替换 (Backward Substitution)
═══════════════════════════════════════

求解 Ux = y ，其中 U 是上三角矩阵。

  x₂ = y₂ / u₂₂
  x₁ = (y₁ - u₁₂·x₂) / u₁₁
  x₀ = (y₀ - u₀₁·x₁ - u₀₂·x₂) / u₀₀

一般公式:
  xᵢ = (yᵢ - Σ(j=i+1 to N-1) U[i][j]·xⱼ) / U[i][i]

计算复杂度: O(N²)

对于本题:
  x₂ = -2.0 / (-0.6667) = 3.0
  x₁ = (-2.25 - (-1.25)×3.0) / (-0.75) = (-2.25 + 3.75)/(-0.75) = -2.0
  x₀ = (29 - 7×(-2.0) - 9×3.0) / 8 = (29 + 14 - 27) / 8 = 2.0

  x = [2.0, -2.0, 3.0]

═══════════════════════════════════════
