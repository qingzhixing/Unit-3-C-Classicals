═══════════════════════════════════════
Makefile
═══════════════════════════════════════
填写 4 个变量 (CC/CFLAGS/TARGET/SRC) + 编译/清理两条规则。
构建用 make; 判分/自测用 clings run 54 或 clings watch (自动比对标准输出);
看期望输出用 clings tests 54。

═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- find_or_create() 和 pick_best() 的代码骨架已在注释中给出
- 使用 abs() 计算绝对值，需 #include <stdlib.h>
- 邻居扩展顺序固定为「上、下、左、右」(dr={-1,1,0,0}, dc={0,0,-1,1}): 平局时决定走哪条等长路径, 直接影响输出, 务必一致
- parent 存储的是 nodes[] 中的索引，不是坐标
- 路径长度 = 步数（起点不算一步），所以 path_len - 1
- Closed 表就是 nodes 数组中 closed==true 的那些节点
- Open 表就是 nodes 数组中 closed==false 的那些节点
'''

