[[exercises]]
name = "49_dining-philosophers-sync"
title = "哲学家就餐问题 — Dining Philosophers (真实多线程)"
unit = "unit3"
lesson = 49
order = 97
mode = "make+stdout"
source = "dining_philosophers.c"
binary = "dining_philosophers"
make_targets = ["all"]
cflags = ["-std=c11", "-Wall", "-Wextra", "-pedantic", "-O2", "-pthread"]
ldflags = ["-pthread"]
lesson_url = "https://cnb.cool/opencamp/learning-nccl/Unit-3-C-Panorama/-/tree/main/lessons/49_dining-philosophers-sync"
hint = '''
哲学家就餐: 真实多线程 + 可观测死锁。

═══════════════════════════════════════
为什么用真实多线程？
═══════════════════════════════════════
单线程模拟里"检查两根筷子同时空闲才拿"是原子的，
根本不存在"持有一根等另一根"的中间态 → 死锁四条件
里的"持有并等待"无法表达 → 学员永远看不到死锁发生。

真实多线程下，pthread_mutex_lock 会真正阻塞线程，
"持有左筷等右筷"的窗口真实存在 → 循环等待环可构造、
可观测、可检测。这才是教死锁的正道。

═══════════════════════════════════════
核心数据结构（已提供）
═══════════════════════════════════════
  pthread_mutex_t chopstick[5]   — 5 根筷子 = 5 把互斥锁
  pthread_barrier_t start_gate   — 第一轮同步起跑门
  atomic_int eat_count[5]        — 原子进餐计数（避免数据竞争）
  atomic_int state[5]            — 状态 0/1/2 = T/H/E（仅诊断用）
  atomic_int holding[5]          — 当前持有的左筷编号（诊断用）
  Strategy g_strategy            — NAIVE / ASYMMETRIC / ORDERED

筷子编号规则：哲学家 i 的左筷 = i，右筷 = (i+1)%5

═══════════════════════════════════════
Makefile
═══════════════════════════════════════
Makefile 是 C 工程化的基石——一套规则描述"如何从源码生成程序"。
make 检查文件时间戳，只重编译修改过的文件（增量编译），这在大型项目中
能节省数十分钟的构建时间。本题需要填写 4 个变量 + 3 条命令。

变量:
  CC     — 用什么 C 编译器？（一般都是 gcc 或 cc）
  CFLAGS — 编译选项，建议 -Wall -Wextra -std=c11
  TARGET — 编译产出的可执行文件名
  SRC    — 源文件名

规则:
  $(TARGET): $(SRC)  — 编译命令，用 $< (第一个依赖) 和 $@ (目标)
  test: $(TARGET)    — 手动演示目标：运行程序观察就餐 (如 ./$(TARGET) asymmetric | head -20)
  clean:             — 删除编译产物
  (判分由 clings 分别以 naive/asymmetric/ordered 运行，断言退出码与关键诊断行，不依赖 make test)

Makefile 特殊变量: $< = 第一个依赖文件  $@ = 目标文件

★ 多线程特别提示: 本题用 pthreads，CFLAGS 和链接命令都必须加 -pthread
  （编译期定义 _REENTRANT，链接期链接 pthread 库），否则报
  undefined reference to `pthread_create'

═══════════════════════════════════════
C 代码 — 7 个 TODO
═══════════════════════════════════════

TODO 1 — pickup(id): 按策略拿两根筷子
  left = id, right = (id+1)%5
  NAIVE:       全部先 left 后 right → 循环等待 → 死锁
  ASYMMETRIC:  id==N-1 先 right 后 left；其余先 left 后 right
  ORDERED:     先 min(left,right) 后 max(left,right)
  拿完第一根后 usleep(GRAB_GAP_US) 放大持有并等待窗口
  holding[id] 记录持有的第一根筷（诊断用）

TODO 2 — putdown(id): 释放两根筷子
  逆序释放（先 unlock 第二根，再 unlock 第一根）
  holding[id] = -1

TODO 3 — philosopher(arg): 线程函数
  循环 TARGET_EAT 次：
    think (usleep 随机 THINK_US_MIN~MAX)
    第一轮 pthread_barrier_wait(&start_gate) 同步起跑
    state[id]=1 (HUNGRY)
    pickup(id)
    eat (usleep EAT_US)
    putdown(id)
    eat_count[id]++
  用 rand_r(&seed) 生成可复现思考时长，seed 从 id 派生

TODO 4 — watchdog(arg): 进度停滞哨兵 (非固定墙钟超时)
  死锁 = 所有人都无法推进 = 总进餐数不再增长。周期性(如每 200ms)采样
  eat_count 之和：有进展就重置停滞计数；连续 WATCHDOG_TIMEOUT 秒毫无进展才判死锁。
    循环: usleep(200ms); 若 all_done_flag → return(正常);
          求 total=Σeat_count; total 变了→重置; 否则累计, 停滞满 3s →
          print_deadlock_diag() + exit(2)
  ★ 不要 sleep(3) 一睡到底再判死锁——慢机上 asymmetric/ordered 会被误判
  ★ 不用 alarm/SIGALRM — signal handler 里调 pthread 会死锁

TODO 5 — build_wait_cycle(out, outsz): 构建等待环字符串
  死锁时每人持筷 i 等筷 (i+1)%5，环形如：
  P0 → chop1 → P1 → chop2 → P2 → chop3 → P3 → chop4 → P4 → chop0 → P0

TODO 6 — coffman_check(out, outsz): 自检四条件
  输出: "Coffman check: 互斥✓ 持有等待✓ 不可剥夺✓ 循环等待✓"
  死锁现场四条件必然全部 ✓

TODO 7 — main(argc, argv): 线程编排
  解析 argv[1] → g_strategy (默认 NAIVE)
  打印 banner (含 "strategy=xxx")
  初始化 N 把 mutex + barrier
  初始化 eat_count/state/holding
  detached 创建 watchdog 线程
  创建 N 个 philosopher 线程
  join 全部 philosopher
  all_done_flag = 1
  打印 Final Stats (含 "all philosophers finished" + 每 Pi ate TARGET)
  销毁 mutex/barrier, return 0

═══════════════════════════════════════
退出码协议（判分锚点）
═══════════════════════════════════════
  0 = 全员吃完，无死锁 (asymmetric / ordered 期望)
  2 = watchdog 检测到死锁 (naive 期望)

═══════════════════════════════════════
Coffman 四条件（死锁当且仅当同时成立）
═══════════════════════════════════════
  1. 互斥         — mutex 同一时刻只能被一个线程持有
  2. 持有并等待   — pickup() 先拿左筷再等右筷，中间有 GRAB_GAP_US 窗口
  3. 不可剥夺     — mutex 只能由持有者 unlock
  4. 循环等待     — build_wait_cycle() 构造的环

三策略分别破坏哪个条件？
  ASYMMETRIC → 破坏循环等待（打破对称性）
  ORDERED    → 破坏循环等待（资源偏序）
  NAIVE      → 四条件全保留 → 死锁

───────────────────────────────
参考: README.md 中的死锁图解、三策略对比、逐轮追踪
'''

# 测试用例：三策略组合断言（退出码 + 关键诊断行 + 禁止行）
