hint = '''
B+树索引: ORDER=3 (MAX_KEY=2) 的多路平衡树，叶子节点链表连接。

═══════════════════════════════════════
Makefile
═══════════════════════════════════════
填写 4 个变量 (CC/CFLAGS/TARGET/SRC) + all/clean 两条规则命令。
CC = gcc, CFLAGS = -Wall -Wextra -std=c11, TARGET = bplus_tree, SRC = bplus_tree.c
$(TARGET) 规则: $(CC) $(CFLAGS) -o $(TARGET) $(SRC)   (bptree.h 与源码同目录, 引号包含自动找到)
clean 规则: rm -f $(TARGET)
(判分由 clings 直接比对程序 stdout，无需 test 目标或 expected_output.txt)

═══════════════════════════════════════
C 代码 — 8 个 TODO 区
═══════════════════════════════════════

数据结构（BPTreeNode / ORDER / MAX_KEY 已在 bptree.h 中提供，勿在 .c 里重复定义）:
  BPTreeNode {
      is_leaf, num_keys,
      keys[MAX_KEY+1],           // +1 容纳分裂前的溢出（3 个 key）
      union { children[ORDER+1]; // 内部节点: 子节点指针
              values[MAX_KEY+1]; // 叶子节点: 对应的 value }
      next                        // 叶子链表指针
  }
  ORDER=3, MAX_KEY=2
  内部节点: 最多 2 个 key，最多 3 个子节点
  叶子节点: 最多 2 个 key，最多 2 个 value

TODO 1 — create_node(is_leaf):
  用 malloc 分配节点，设置 is_leaf, num_keys=0, next=NULL。
  若 is_leaf: 用 for 循环将 values[0..MAX_KEY] 置 0
  若 !is_leaf: 用 for 循环将 children[0..ORDER] 置 NULL

TODO 2 — insert_into_leaf(leaf, key, value):
  有序插入到叶子节点。
  1. 找位置: while (pos < num_keys && keys[pos] < key) pos++
  2. 后移: for (i = num_keys; i > pos; i--) 同时移动 keys[i] 和 values[i]
  3. 写入: keys[pos]=key, values[pos]=value
  4. num_keys++

TODO 3 — split_leaf_child(parent, idx, child):
  叶子节点溢出（3 个 key）时分裂。
  1. 创建 new_leaf = create_node(1)
  2. 右半复制: new_leaf->keys[0] = child->keys[2]
              new_leaf->values[0] = child->values[2]
  3. 设置 num_keys: new_leaf->num_keys = 1; child->num_keys = 2
  4. 链表: new_leaf->next = child->next; child->next = new_leaf
  5. 上移: insert_into_inner(parent, idx, new_leaf->keys[0], child, new_leaf)

TODO 4 — split_inner_child(parent, idx, child):
  内部节点溢出（3 个 key、4 个子节点）时分裂。关键区别: 中间键"上推"(不复制)。
  child: keys[0,1,2] + children[0,1,2,3]
  1. 创建 new_inner = create_node(0)
  2. up_key = child->keys[1]                    // 中间键，上推到父节点
  3. 右半: new_inner->keys[0]     = child->keys[2]
           new_inner->children[0] = child->children[2]
           new_inner->children[1] = child->children[3]
           new_inner->num_keys    = 1
  4. 左半: child->num_keys = 1                  // 只保留 keys[0] 与 children[0,1]
  5. 上推: insert_into_inner(parent, idx, up_key, child, new_inner)
  对比: 叶子分裂"复制"右半首键上移(数据留叶子); 内部分裂"移动"中间键上推。
  (分发器 split_child 已提供: 叶子→split_leaf_child, 内部→split_inner_child)

TODO 5 — insert_rec(node, key, value):
  递归插入，返回 NULL 或溢出节点。
  叶子:
    insert_into_leaf(node, key, value)
    若 num_keys > MAX_KEY → return node  // 溢出
    否则 return NULL
  内部节点:
    找子节点位置: while (pos < num_keys && keys[pos] <= key) pos++
    递归: overflow = insert_rec(children[pos], key, value)
    若 overflow:
      split_child(node, pos, overflow)          // 分发: 叶子/内部各自分裂
      若 node->num_keys > MAX_KEY → return node
    return NULL

TODO 6 — insert(root, key, value):
  入口函数。
  1. 空树: root = create_node(1); 放入 key/value; num_keys=1; return root
  2. 非空: overflow = insert_rec(root, key, value)
  3. 若 overflow:
       new_root = create_node(0)
       new_root->children[0] = root
       split_child(new_root, 0, overflow)        // 旧根可能是叶子或内部节点
       return new_root
  4. return root

TODO 7 — search(root, key):
  查找 key 的 value，未找到返回 -1。
  1. root==NULL → return -1
  2. while (!cur->is_leaf): 找 pos 并 cur = children[pos]
  3. 在叶子中: for i 遍历，keys[i]==key → return values[i]
  4. return -1

TODO 8 — print_tree(root, depth):
  递归缩进打印。
  - root==NULL: "(empty tree)\\n"
  - 缩进: depth 个 "  "（两个空格）
  - 叶子: "[leaf] keys: k0 k1 ... | values: v0 v1 ...\\n"
  - 内部: "[inner] keys: k0 k1 ...\\n" + 递归打印 children[0..num_keys]

───────────────────────────────
B+树与普通 B 树的区别:
  - B+树: 内部节点只存 key（路由），叶子存 key+value
  - B 树: 所有节点都存 key+value
  - B+树优势: 叶子链表支持高效范围查询，内部节点可容纳更多 key
───────────────────────────────
参考: README.md 中的分裂过程图解
'''

