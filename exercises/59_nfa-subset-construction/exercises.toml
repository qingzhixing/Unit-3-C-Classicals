═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- 位掩码操作务必使用 (1 << s) 而非直接写数字
- ε-闭包的不动点迭代: 需要外层 do-while + 内层 for 扫描
- NFA 模拟中, 每个符号的转移分两步: symbol 转移 → ε-闭包
- 子集构造中, 必须先计算 symbol 转移再求ε-闭包(不能颠倒)
- 空集(next_subset==0)表示该符号下无合法转移
- print_state_set 已提供, 直接调用即可
- 注意 printf 格式(表头/对齐), 用 clings tests 59 查看期望输出
- 与 ACCEPT_MASK 相交(含状态 3 或 4)的子集即为接受态
- NFA 有 5 个状态, DFA 最多 2^5=32 个状态, MAX_SUBSETS 已设好
