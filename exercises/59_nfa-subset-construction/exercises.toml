hint = '''
NFA 模拟与子集构造: 固定 NFA 识别语言 a*b | ab*，实现 ε-闭包计算、NFA 模拟和子集构造 (→DFA)。

═══════════════════════════════════════
背景: NFA 与 DFA
═══════════════════════════════════════
NFA (Nondeterministic Finite Automaton) 与 DFA (Deterministic FA)
的区别在于:
- DFA: 每个状态对每个符号有唯一后继
- NFA: 允许 (1) 同一符号有多条转移 (2) ε转移 (空转移)

定理: NFA 与 DFA 等价——任何 NFA 都可以通过"子集构造"转化为
等价的 DFA 。这是自动机理论最核心的结论之一。

═══════════════════════════════════════
本题 NFA 定义
═══════════════════════════════════════
语言: a*b | ab*  (a*后接一个 b, 或 一个 a 后接 b*)

设计要点: 两个分支使用【不同】的接受态(3 与 4)。若共用一个带 b 自环
的接受态, a*b 分支会搭上自环而误收 a*b⁺(如 "aabb"、"bb"), 这正是本 NFA
特意用 Thompson 式并联+独立接受态来避免的经典陷阱。

状态转移图:
              a(自环)
    ┌── ε ──→ 1 ──────┐
    │         │ b     │
    0         ↓       └→ 1
    │         3 (接受态, 无出边 ⇒ 恰好一个 b)
    └── ε ──→ 2 ──a──→ 4 (接受态)
                       │
                       └── b ──→ 4 (b 自环)

状态 0: 初态(非接受, 仅 ε 转移)
状态 1: a* 循环 (a→1 自环, b→3)
状态 3: 接受态 (无出边)
状态 2: ab* 入口 (a→4)
状态 4: 接受态 (b→4 自环)

ε转移:  0→1, 0→2
a 转移:  1→1, 2→4
b 转移:  1→3, 4→4
接受态: {3, 4}

输入串测试:
  "aab": {0,1,2}--a-->{1,4}--a-->{1}--b-->{3} → ACCEPT ✓ (a*b)
  "aba": {0,1,2}--a-->{1,4}--b-->{3,4}--a-->{} → REJECT ✓
  反例验证(不应被接受): "aabb"、"bb" 均在读到多余 b 后落入空集 → REJECT ✓

═══════════════════════════════════════
核心概念 1: ε-闭包 (ε-closure)
═══════════════════════════════════════
定义: ε-closure(S) = 从 S 中任意状态出发，仅经过ε转移能到达
的所有状态的集合(包括 S 自身)。

算法(不动点迭代):
  closure = S
  do:
    changed = false
    for each state s in closure:
      for each ε-target t of s:
        if t not in closure:
          closure = closure ∪ {t}
          changed = true
  while changed

示例: ε-closure({0}) = {0, 1, 2}
  初始: {0}
  0 的ε目标: 1,2 → 加入 → {0,1,2}
  1 的ε目标: 无
  2 的ε目标: 无
  不动点 → {0,1,2}

═══════════════════════════════════════
核心概念 2: 子集构造 (Subset Construction)
═══════════════════════════════════════
原理: DFA 的每个状态对应 NFA 状态集合的一个子集 (幂集)。
NFA 有 n 个状态时, DFA 最多有 2^n 个状态。

算法:
  1. DFA 初态 = ε-closure({NFA 初态})
  2. 对每个未处理的 DFA 状态 (子集) S:
     a. 标记 S 是否包含 NFA 接受态
     b. 对每个符号 sym:
        - 计算 move(S, sym) = {t | ∃s∈S, s--sym-->t}
        - 新子集 T = ε-closure(move(S, sym))
        - 若 T 不为空:
          · 若 T 已对应某 DFA 状态则复用
          · 否则创建新 DFA 状态
          · 记录转移: S --sym--> T
        - 若 T 为空: 无转移 (或指向死状态)
  3. 打印 DFA 转换表

本题 NFA→DFA 结果 (6 个 DFA 状态):
  D0 = {0,1,2}    (初态, 非接受)
  D1 = {1,4}      (接受态, 含 4)
  D2 = {3}        (接受态, 含 3)
  D3 = {1}        (非接受态)
  D4 = {3,4}      (接受态)
  D5 = {4}        (接受态)

  DFA 转移:
    D0 --a--> D1,  D0 --b--> D2
    D1 --a--> D3,  D1 --b--> D4
    D2 --a--> --,  D2 --b--> --
    D3 --a--> D3,  D3 --b--> D2
    D4 --a--> --,  D4 --b--> D5
    D5 --a--> --,  D5 --b--> D5

═══════════════════════════════════════
位掩码技巧
═══════════════════════════════════════
用 int 的低 5 位表示状态集, 第 s 位=1 表示状态 s 在集合中:
  状态 0 → bit 0 (值 1)
  状态 1 → bit 1 (值 2)
  状态 2 → bit 2 (值 4)
  状态 3 → bit 3 (值 8)
  状态 4 → bit 4 (值 16)

加入状态 s: states |= (1 << s)
检查状态 s: states & (1 << s)
空集判断: states == 0

