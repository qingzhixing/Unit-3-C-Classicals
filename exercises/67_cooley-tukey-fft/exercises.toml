hint = '''
快速傅里叶变换: 用 C 语言实现 Cooley-Tukey FFT 算法 (N=8)。

═══════════════════════════════════════
背景: 离散傅里叶变换 (DFT) 与 FFT
═══════════════════════════════════════

离散傅里叶变换 (DFT):
  X[k] = Σ(n=0 to N-1) x[n] · e^(-2πi·k·n/N),  k=0,1,...,N-1

直接计算 DFT 需要 O(N²) 次复数乘法。 Cooley 和 Tukey 于 1965 年
提出 FFT 算法，利用"分治"思想将复杂度降至 O(N log N)。

Cooley-Tukey FFT 核心思想 (分治):
  将 N 点 DFT 分解为两个 N/2 点 DFT:
    - 偶数索引: x[0], x[2], x[4], x[6] → N/2 点 DFT → E[k]
    - 奇数索引: x[1], x[3], x[5], x[7] → N/2 点 DFT → O[k]
    - 组合: X[k] = E[k] + W_N^k · O[k]
           X[k+N/2] = E[k] - W_N^k · O[k]

  其中 W_N^k = e^(-2πi·k/N) 称为"旋转因子" (twiddle factor)。

═══════════════════════════════════════
蝶形运算 (Butterfly Operation)
═══════════════════════════════════════

蝶形是 FFT 的基本运算单元:

        even ──────┬────── even + W·odd  (上支路: 和)
                    │
                    W (旋转因子)
                    │
        odd  ──────┼────── even - W·odd  (下支路: 差)
                    │
                    ✕ (交叉)

  信号流图 (N=8, 3 层蝶形):

  Stage 1            Stage 2            Stage 3
  (group=2)          (group=4)          (group=8)
                                          W0
  x[0]─┬─●─ X0[0] ──┬─●─ X1[0] ──┬─●─ X2[0]=X[0]
       │             │             │
  x[4]─┴─●─ X0[1] ──┤             ├─W1─●─ X2[1]=X[1]
                     │             │
  x[2]─┬─●─ X0[2] ──┼─W2─●─ X1[2]─┤
       │             │             ├─W2─●─ X2[2]=X[2]
  x[6]─┴─●─ X0[3] ──┤             │
                     │             ├─W3─●─ X2[3]=X[3]
  x[1]─┬─●─ X0[4] ──┤             │
       │             │             ├─W0─●─ X2[4]=X[4]
  x[5]─┴─●─ X0[5] ──┤             │
                     │             ├─W1─●─ X2[5]=X[5]
  x[3]─┬─●─ X0[6] ──┼─W2─●─ X1[6]─┤
       │             │             ├─W2─●─ X2[6]=X[6]
  x[7]─┴─●─ X0[7] ──┴─W2─●─ X1[7]─┴─W3─●─ X2[7]=X[7]

  ● = 蝶形节点

═══════════════════════════════════════
位反转置换 (Bit-Reversal Permutation)
═══════════════════════════════════════

位反转是 FFT 的输入重排步骤。将索引用二进制表示后反转:

  ┌──────┬─────────┬──────────┬──────────┐
  │ 索引 │ 二进制  │ 位反转   │ 新索引   │
  ├──────┼─────────┼──────────┼──────────┤
  │  0   │  000    │   000    │    0     │
  │  1   │  001    │   100    │    4     │
  │  2   │  010    │   010    │    2     │
  │  3   │  011    │   110    │    6     │
  │  4   │  100    │   001    │    1     │
  │  5   │  101    │   101    │    5     │
  │  6   │  110    │   011    │    3     │
  │  7   │  111    │   111    │    7     │
  └──────┴─────────┴──────────┴──────────┘

原始输入: [1, 2, 3, 4, 4, 3, 2, 1]
位反转后: [1, 4, 3, 2, 2, 3, 4, 1]

位反转的作用: 使相邻元素构成蝶形对。

实现方法 (高效, 无需递归):
  j = 0;
  for (i = 1; i < n; i++) {
      int bit = n >> 1;
      for (; j & bit; bit >>= 1)
          j ^= bit;
      j ^= bit;
      if (i < j)
          swap(a[i], a[j]);
  }

═══════════════════════════════════════
3 层蝶形计算追踪 (N=8)
═══════════════════════════════════════

输入 (位反转后): [1, 4, 3, 2, 2, 3, 4, 1]

Stage 1 (group_size=2, half=1, step=4, 只用 W8^0):
  蝶形对: (0,1) (2,3) (4,5) (6,7)
  (1,4):  even=1, odd=4, W=1 → T=4, even=5, odd=-3
  (3,2):  even=3, odd=2, W=1 → T=2, even=5, odd=1
  (2,3):  even=2, odd=3, W=1 → T=3, even=5, odd=-1
  (4,1):  even=4, odd=1, W=1 → T=1, even=5, odd=3
  结果: [5, -3, 5, 1, 5, -1, 5, 3]

Stage 2 (group_size=4, half=2, step=2, 用 W8^0,W8^2):
  组 0 (idx 0-3): k=0:W0, k=1:W2=-i
    k=0: (0,2): even=5, odd=5, W=1 → T=5, even=10, odd=0
    k=1: (1,3): even=-3, odd=1, W=-i → T=1*(-i)=-i, even=-3-i, odd=-3+i
  组 1 (idx 4-7): k=0:W0, k=1:W2=-i
    k=0: (4,6): even=5, odd=5, W=1 → T=5, even=10, odd=0
    k=1: (5,7): even=-1, odd=3, W=-i → T=3*(-i)=-3i, even=-1-3i, odd=-1+3i
  结果: [10, -3-i, 0, -3+i, 10, -1-3i, 0, -1+3i]

Stage 3 (group_size=8, half=4, step=1, 用 W8^0,W8^1,W8^2,W8^3):
  组 0 (idx 0-7):
    k=0: (0,4): even=10, odd=10, W=W0=1 → T=10, even=20, odd=0
    k=1: (1,5): even=-3-i, odd=-1-3i, W=W1=√2/2-i√2/2
          T = W1 * (-1-3i) = (-√2/2-3√2/2) + i(√2/2-3√2/2)
            ≈ -2.828427 - 1.414214i
          even = (-3-i) + T ≈ -5.828427 - 2.414214i
          odd  = (-3-i) - T ≈ -0.171573 + 0.414214i
    k=2: (2,6): even=0, odd=0, W=W2=-i → T=0, even=0, odd=0
    k=3: (3,7): even=-3+i, odd=-1+3i, W=W3=-√2/2-i√2/2
          T = W3 * (-1+3i) ≈ 2.828427 - 1.414214i
          even = (-3+i) + T ≈ -0.171573 - 0.414214i
          odd  = (-3+i) - T ≈ -5.828427 + 2.414214i
  结果: [20, -5.828-2.414i, 0, -0.172-0.414i, 0, -0.172+0.414i, 0, -5.828+2.414i]

═══════════════════════════════════════
频谱分析: 频域结果解读
═══════════════════════════════════════

频域结果:
  X[0] = 20.0        → DC 分量 (直流分量 = 所有采样之和)
  X[1] = -5.83-2.41i → 基频分量 (1 个周期/8 采样)
  X[2] = 0           → 2 次谐波 (2 个周期/8 采样) — 为 0!
  X[3] = -0.17-0.41i → 3 次谐波
  X[4] = 0           → 奈奎斯特频率 (4 个周期/8 采样) — 为 0!
  X[5] = -0.17+0.41i → 共轭对称于 X[3]
  X[6] = 0           → 共轭对称于 X[2]
  X[7] = -5.83+2.41i → 共轭对称于 X[1]

实输入信号的频域共轭对称性: X[N-k] = conj(X[k])
输入对称性: [1,2,3,4,4,3,2,1] 是偶对称信号 → 频谱纯实数!
  但 FFT 结果有虚部? 因为位反转破坏了对称性!
  实际上 x[0]=1, x[1]=2, x[2]=3, x[3]=4, x[4]=4, x[5]=3, x[6]=2, x[7]=1
  这是循环对称而非镜像对称, 所以频谱有虚部。

