五个 TODO 任务
═══════════════════════════════════════

TODO 1 — bit_reverse():
  对 Complex 数组执行位反转置换。
  算法 (高效位反转):
    j = 0;
    for (i = 1; i < n; i++) {
        int bit = n >> 1;
        for (; j & bit; bit >>= 1)
            j ^= bit;
        j ^= bit;
        if (i < j) { 交换 a[i] 和 a[j]; }
    }
  注意: 只有 i < j 时才交换, 避免二次交换恢复原状。
  N=8 的位反转: 0→0, 1→4, 2→2, 3→6, 4→1, 5→5, 6→3, 7→7 。

TODO 2 — butterfly():
  执行一层蝶形运算。
  对于 stage s (1,2,3):
    group_size = 1 << stage;   // 2, 4, 8
    half = group_size >> 1;    // 1, 2, 4
    step = n / group_size;     // 4, 2, 1

  外层循环: for (g = 0; g < n; g += group_size)
  内层循环: for (k = 0; k < half; k++)
    even_idx = g + k;
    odd_idx  = g + k + half;
    twiddle_idx = k * step;

    Complex T;  // T = W[twiddle_idx] * a[odd_idx]
    T.real = W[twiddle_idx].real * a[odd_idx].real - W[twiddle_idx].imag * a[odd_idx].imag;
    T.imag = W[twiddle_idx].real * a[odd_idx].imag + W[twiddle_idx].imag * a[odd_idx].real;

    // 蝶形: upper=even+T, lower=even-T
    Complex even = a[even_idx];  // 先保存!
    a[even_idx].real = even.real + T.real;
    a[even_idx].imag = even.imag + T.imag;
    a[odd_idx].real  = even.real - T.real;
    a[odd_idx].imag  = even.imag - T.imag;

  关键: 必须先保存 a[even_idx] 到局部变量, 因为它会在
        计算 a[odd_idx] 时被覆盖!

TODO 3 — fft():
  主 FFT 流程:
  1. 调用 bit_reverse(a, n);
  2. 打印 "Bit-reversed order:\n"
  3. 用 for 循环打印每个元素:
     printf("  [%d]: %10.6f%+10.6fi\n", i, a[i].real, a[i].imag);
  4. for (stage = 1; stage <= 3; stage++):
       调用 butterfly(a, n, stage);
       打印 "Stage %d (group_size=%d):\n", stage, 1 << stage;
       打印每个元素 (同上格式)

  注意: 使用 %+10.6f 格式, imag 为负时会自动显示负号。

TODO 4 — print_complex():
  单行实现: printf("%.6f%+.6fi", c.real, c.imag);
  使用 %+ 标志使正数也显示+号。

TODO 5 — main():
  1. 声明 Complex a[N];
  2. for (i = 0; i < N; i++) { a[i].real = input[i]; a[i].imag = 0.0; }
  3. 打印: "=== Cooley-Tukey FFT (N=8) ===\n"
  4. 打印: "\n"
  5. 打印: "Input (time domain):\n"
  6. 打印: "  x = [1, 2, 3, 4, 4, 3, 2, 1]\n"
  7. 打印: "\n"
  8. 调用 fft(a, N);
  9. 打印: "\n"
  10. 打印: "Final frequency-domain result:\n"
  11. for (i = 0; i < N; i++):
        打印 "  X[%d] = ", i;
        调用 print_complex(a[i]);
        打印 "\n";
  12. return 0;

