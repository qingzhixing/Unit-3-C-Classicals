CC=gcc, CFLAGS=-Wall -std=c99, LDFLAGS=-lm, TARGET=fft, SRC=fft.c
编译命令: $(CC) $(CFLAGS) -o $(TARGET) $(SRC) $(LDFLAGS)
注意: 必须链接数学库 -lm, 因为使用了 cos/sin (M_PI 在 math.h 中)。

═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- Complex 结构体和 W 表已提供, 不需要自己定义或修改
- 位反转: 使用高效位运算算法, 不要硬编码 8 个位置的映射
- 蝶形: 必须先保存 even = a[even_idx], 否则会被覆盖
- 复数乘法: (a+bi)(c+di) = (ac-bd) + (ad+bc)i
- 打印格式必须与 expected_output.txt 完全一致
- 使用 %+10.6f 打印 imag 部分, 自动处理正负号
- 不要忘记 #include <math.h>
- 链接时加 -lm
- 输出中每个元素格式: "  [%d]: %10.6f%+10.6fi\n"
- 最终结果格式: "  X[%d] = %.6f%+.6fi\n"
- 注意 print_complex 没有前导空格
- 频谱对称性: 对于实输入, X[N-k] = conj(X[k])
'''

