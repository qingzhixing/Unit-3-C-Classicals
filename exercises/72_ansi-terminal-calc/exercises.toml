═══════════════════════════════════════
Makefile 填写
═══════════════════════════════════════
填写 4 个变量和 1 条编译命令:
CC = gcc
CFLAGS = -Wall -std=c99
TARGET = terminal_calc
SRC = terminal_calc.c
编译命令: $(CC) $(CFLAGS) -o $(TARGET) $(SRC)

═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- parse_number 中 isdigit 参数要强转 (unsigned char), 否则中文/负数 char 会出错
- parse_number 用 while 而非 if — 支持多位数如 "42"
- precedence 中 '(' 返回 0, 这样它永远不会被 >= 条件触发弹栈
- evaluate 中遇到 ')' 时, while 弹栈直到 ops[otop-1] == '('
- evaluate 中运算符压栈前, 先弹栈所有优先级 >= 当前运算符的已有运算符
- 弹栈计算时注意顺序: 先 pop b (右操作数), 再 pop a (左操作数)
- evaluate 遍历结束后不要忘记处理 ops 栈中剩余运算符
- ANSI 颜色宏是字符串字面量, 直接拼接: COLOR_GREEN "text" COLOR_RESET
- 每个颜色块后必须跟 COLOR_RESET, 否则颜色会"泄漏"
- 输出含 ANSI 转义序列的原始字节 (ESC=\033), clings 判分做精确字节比对 (期望输出以 base64 存储)
- 构建用 make; 判分/自测用 clings run 或 clings watch; clings tests 72 可查看期望输出
- 不要输出多余空格或换行, 否则字节比对失败
- 除法要检查除数为 0, 返回 0 即可 (本题表达式不会触发)
- 两个测试表达式固定为 "3+4*2" 和 "(5+3)*2"
'''

