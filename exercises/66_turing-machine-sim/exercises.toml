hint = '''
图灵机模拟器: 用 C 语言模拟图灵机识别语言 L = {aⁿbⁿ | n≥1}。

═══════════════════════════════════════
背景: 图灵机 (Turing Machine)
═══════════════════════════════════════

图灵机是 Alan Turing 于 1936 年提出的抽象计算模型，
用于精确定义"可计算性"(computability)的概念。

图灵机的组成部分:
  ┌──────────────────────────────────────────┐
  │  有限控制器 (Finite Control)              │
  │  ┌─────────────────────────────┐         │
  │  │ 状态: q0, q1, q2, q3 (接受)  │         │
  │  │ 转移规则表 (Transition Table) │         │
  │  └─────────────────────────────┘         │
  │         ↑ 读写头 (Head)                   │
  │  ┌──┬──┬──┬──┬──┬──┬──┬──┬──┬──┐        │
  │  │a │a │a │b │b │b │_ │_ │_ │_ │ ...    │
  │  └──┴──┴──┴──┴──┴──┴──┴──┴──┴──┘        │
  │         无限纸带 (Infinite Tape)           │
  └──────────────────────────────────────────┘

与有限自动机(FA)的关键区别:
- FA: 只读头, 单向移动, 无写入能力
- TM: 可读可写, 双向移动, 无限纸带

计算能力:
  正则语言 (FA) ⊂ 上下文无关语言 (PDA) ⊂ 递归可枚举语言 (TM)

═══════════════════════════════════════
本题图灵机: 识别 aⁿbⁿ
═══════════════════════════════════════

语言: L = {aⁿbⁿ | n ≥ 1} = {ab, aabb, aaabbb, aaaabbbb, ...}

这不是正则语言 (无法用 DFA/NFA 识别, 因为需要"计数")。
这是上下文无关语言 (可用 PDA 识别, 也可用图灵机识别)。

转移图 (状态转移图):

            a/X,R
         ┌─────────┐
         │         │
    ┌────▼───┐     │   a/a,R
    │   q0   │     │  ┌──────┐
    └──┬──┬──┘     └──►  q1  │
       │  │             │    │
 Y/Y,R │  │ X/X,R       │ b/Y,L
       │  │      ┌──────┘
       │  │      │
    ┌──▼──┴──┐   │
    │   q3   │   │
    │ (接受)  │   │
    └──┬─────┘   │
       │         │
  Y/Y,R│    ┌────▼───┐
       │    │   q2   │◄──┐
       │    └───┬────┘  a/a,L
       │        │      Y/Y,L
       └────────┘

转移函数 δ(state, symbol) = (next_state, write_symbol, move):

  δ(q0, a) = (q1, X, R)    — 标记第一个 a 为 X, 向右寻找 b
  δ(q0, Y) = (q3, Y, R)    — 所有 a 都已匹配, 检查剩余
  δ(q1, a) = (q1, a, R)    — 跳过未标记的 a
  δ(q1, Y) = (q1, Y, R)    — 跳过已匹配的 Y
  δ(q1, b) = (q2, Y, L)    — 标记一个 b 为 Y, 向左返回
  δ(q2, a) = (q2, a, L)    — 向左跳过 a
  δ(q2, Y) = (q2, Y, L)    — 向左跳过 Y
  δ(q2, X) = (q0, X, R)    — 找到 X, 开始下一轮
  δ(q3, Y) = (q3, Y, R)    — 向右跳过 Y
  δ(q3, _) = (halt, accept) — 到达空白, 接受

策略: 每次消去一个 a 和一个 b, 用 X 和 Y 标记。
若最终所有 a 都变成 X 且所有 b 都变成 Y, 则接受。

═══════════════════════════════════════
转移表在代码中的表示
═══════════════════════════════════════

TRANSITION[state][symbol_index] 是一个 Transition 结构体:
  typedef struct {
      int next_state;     // -1 表示无转移 → 拒绝
      char write_symbol;  // 要写入纸带的符号
      int move;           // LEFT(-1), RIGHT(1), 或 HALT(0)
  } Transition;

symbol_index 由 sym_to_idx() 映射:
  'a'→0, 'b'→1, 'X'→2, 'Y'→3, '_'→4

TRANSITION 表已完整提供, 无需修改。

═══════════════════════════════════════
纸带追踪: "aaabbb" (接受)
═══════════════════════════════════════

初始: [a a a b b b _ _], q0, head=0

第 1 轮消去 (匹配第 1 对 a-b):
  Step 1: q0 读 a→写 X 右移 q1 → [X a a b b b _ _], q1, head=1
  Step 2: q1 读 a→右移 q1   → [X a a b b b _ _], q1, head=2
  Step 3: q1 读 a→右移 q1   → [X a a b b b _ _], q1, head=3
  Step 4: q1 读 b→写 Y 左移 q2 → [X a a Y b b _ _], q2, head=2
  Step 5: q2 读 a→左移 q2   → [X a a Y b b _ _], q2, head=1
  Step 6: q2 读 a→左移 q2   → [X a a Y b b _ _], q2, head=0
  Step 7: q2 读 X→右移 q0   → [X a a Y b b _ _], q0, head=1

第 2 轮消去 (匹配第 2 对 a-b):
  Step 8:  q0 读 a→写 X 右移 q1 → [X X a Y b b _ _], q1, head=2
  Step 9:  q1 读 a→右移 q1   → [X X a Y b b _ _], q1, head=3
  Step 10: q1 读 Y→右移 q1   → [X X a Y b b _ _], q1, head=4
  Step 11: q1 读 b→写 Y 左移 q2 → [X X a Y Y b _ _], q2, head=3
  Step 12: q2 读 Y→左移 q2   → [X X a Y Y b _ _], q2, head=2
  Step 13: q2 读 a→左移 q2   → [X X a Y Y b _ _], q2, head=1
  Step 14: q2 读 X→右移 q0   → [X X a Y Y b _ _], q0, head=2

第 3 轮消去 (匹配第 3 对 a-b):
  Step 15: q0 读 a→写 X 右移 q1 → [X X X Y Y b _ _], q1, head=3
  Step 16: q1 读 Y→右移 q1   → [X X X Y Y b _ _], q1, head=4
  Step 17: q1 读 Y→右移 q1   → [X X X Y Y b _ _], q1, head=5
  Step 18: q1 读 b→写 Y 左移 q2 → [X X X Y Y Y _ _], q2, head=4
  Step 19: q2 读 Y→左移 q2   → [X X X Y Y Y _ _], q2, head=3
  Step 20: q2 读 Y→左移 q2   → [X X X Y Y Y _ _], q2, head=2
  Step 21: q2 读 X→右移 q0   → [X X X Y Y Y _ _], q0, head=3

验收阶段:
  Step 22: q0 读 Y→右移 q3   → [X X X Y Y Y _ _], q3, head=4
  Step 23: q3 读 Y→右移 q3   → [X X X Y Y Y _ _], q3, head=5
  Step 24: q3 读 Y→右移 q3   → [X X X Y Y Y _ _], q3, head=6
  此时 q3 读 _, 接受!

═══════════════════════════════════════
纸带追踪: "aab" (拒绝)
═══════════════════════════════════════

初始: [a a b _ _], q0, head=0

第 1 轮消去 (匹配第 1 对 a-b):
  Step 1: q0 读 a→写 X 右移 q1 → [X a b _ _], q1, head=1
  Step 2: q1 读 a→右移 q1   → [X a b _ _], q1, head=2
  Step 3: q1 读 b→写 Y 左移 q2 → [X a Y _ _], q2, head=1
  Step 4: q2 读 a→左移 q2   → [X a Y _ _], q2, head=0
  Step 5: q2 读 X→右移 q0   → [X a Y _ _], q0, head=1

第 2 轮: 尝试匹配第 2 对
  Step 6: q0 读 a→写 X 右移 q1 → [X X Y _ _], q1, head=2
  Step 7: q1 读 Y→右移 q1   → [X X Y _ _], q1, head=3
  Step 8: q1 读_ → 无转移! → q_reject

拒绝原因: a 的个数(2) > b 的个数(1), 第 2 轮找不到 b 来匹配。

