═══════════════════════════════════════
关键概念
═══════════════════════════════════════

Church-Turing 论题 (Church-Turing Thesis):
  "任何直观上可计算的函数都可以被图灵机计算。"
  这不是数学定理, 而是一个无法证明但被广泛接受的假说。
  所有已知的计算模型 (λ演算, 递归函数, C 程序, Python...) 
  都与图灵机等价。

停机问题 (Halting Problem):
  "是否存在一个算法, 能判断任意图灵机在任意输入上是否停机?"
  答案: 不存在。这是不可判定问题 (undecidable problem)。
  图灵用对角线法证明了这一点, 这也是计算机科学最重要的
  理论结果之一。

通用图灵机 (Universal Turing Machine):
  可以模拟任何其他图灵机的图灵机。
  这等价于现代计算机的"存储程序"概念。
  冯·诺依曼架构即受此启发。

图灵完备 (Turing Completeness):
  一个计算系统若能模拟图灵机, 则称其为图灵完备的。
  C 语言、任何通用编程语言都是图灵完备的。
  甚至某些"意外"的系统也是图灵完备的:
    - Magic: The Gathering
    - Minecraft 红石电路
    - Excel 公式
    - C++ 模板元编程

