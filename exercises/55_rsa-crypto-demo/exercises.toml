关键提示
═══════════════════════════════════════
- 所有中间结果必须用 uint64_t ，避免溢出
- ext_gcd 中的 x 可能为负，需要用 int64_t
- d 必须调整为正数 (d = (x % phi + phi) % phi)
- printf 格式串中 PRIu64/PRId64 是宏，需要写为 "%" PRIu64
- 输出格式必须与 clings tests 55 展示的期望输出逐字符一致
- is_prime 内部调用 fast_pow ，注意参数类型匹配
- gen_keys 中使用 int64_t 转换调用 ext_gcd
