═══════════════════════════════════════
知识补充： Miller-Rabin 素性测试
═══════════════════════════════════════

RSA 的安全性依赖于大素数的生成。实际 RSA 密钥生成中，
需要用素性测试验证候选数是否为素数。

Miller-Rabin 是最常用的概率素性测试：
  - 基于费马小定理的加强版
  - 对 k 个随机见证人，错误概率 < 4^(-k)
  - 本题 {2,3,5,7,11} 对所有 n < 2,152,302,898,747 (≈2.15×10^12) 可确定性判定 (Jaeschke 1993)
  - 复杂度 O(k log³ n)，非常高效

对称加密 vs 非对称加密:
  对称加密 (如 AES, DES):
    - 加密和解密使用同一把密钥
    - 速度快，适合大量数据加密
    - 密钥分发困难：双方需要安全地共享密钥

  非对称加密 (如 RSA, ECC):
    - 公钥加密，私钥解密（公钥可公开分发）
    - 速度慢 100-1000 倍，通常只加密对称密钥或小数据
    - 解决了密钥分发问题

═══════════════════════════════════════
安全性讨论
═══════════════════════════════════════

本题 n=3233 是玩具规模，可被立即分解。
真实 RSA 使用 ≥2048 位的 n (约 617 个十进制位)。
推荐阅读: PKCS#1 标准、 OAEP 填充方案、 RSA 签名。

