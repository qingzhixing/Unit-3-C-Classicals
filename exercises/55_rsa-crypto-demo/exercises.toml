TODO 8 — main(): 主流程
═══════════════════════════════════════

按照 clings tests 55 展示的期望输出格式输出 5 个步骤。

Step 1: 参数与素性验证
  - 打印 p 的值，调用 is_prime(p) 验证，打印 "prime ✓" 或 "composite ✗"
  - 打印 q 的值，调用 is_prime(q) 验证
  - 打印 n, φ, e, m

Step 2: 密钥生成
  - 调用 gen_keys(p, q, e, &gen_n, &gen_phi, &d)
  - 检查返回值，失败则 return 1

Step 3: 加密
  - c = encrypt(m, e, n)
  - 打印加密过程与结果

Step 4: 解密
  - mp = decrypt(c, (uint64_t)d, n)
  - 打印解密过程与结果

Step 5: 验证
  - 比较 m 与 mp ，打印 RSA works! ✓

关键格式要求:
  - 使用 PRIu64 格式化 uint64_t (例如 printf("%" PRIu64, val))
  - 使用 PRId64 格式化 int64_t (例如 printf("%" PRId64, val))
  - is_prime 返回 int: 1=素数, 0=合数
  - 确保 d 为正数: while(d < 0) d += phi; d = d % phi;
  - Step 5 最后一行以 ✓ (Unicode U+2713) 结尾

