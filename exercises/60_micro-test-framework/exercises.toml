═══════════════════════════════════════
断言对比表
═══════════════════════════════════════

| 宏            | 比较对象     | 失败时行为              | NULL 安全 |
|---------------|-------------|------------------------|-----------|
| ASSERT_EQ     | 整数 (int)   | 打印期望值和实际值， return | N/A       |
| ASSERT_STREQ  | 字符串 (char*)| 打印期望串和实际串， return | 是 (双 NULL 通过) |
| TEST(name)    | N/A (定义)   | 创建 static void 测试函数 | N/A       |
| RUN_TESTS()   | N/A (执行)   | 遍历运行并打印汇总报告    | N/A       |

═══════════════════════════════════════
常见错误
═══════════════════════════════════════

1. 宏参数忘记加括号:
   #define ASSERT_EQ(a,b) if(a!=b)...  ← 错误！
   应写: if((a)!=(b))...

2. 忘记 do-while(0):
   展开后 if/else 语法错乱。

3. 字符串化 # 用错位置：
   #a 只能用在宏定义中，不能用在普通代码里。

4. ASSERT_STREQ 直接传 strcmp(a,b):
   如果 a 或 b 是表达式会被多次求值，先存到局部变量。

5. ASSERT_STREQ NULL 处理错误:
   if (_aa == NULL || _bb == NULL || strcmp(...) != 0)  ← 双 NULL 也失败！
   正确: if ((_aa==NULL) != (_bb==NULL) || (_aa && _bb && strcmp(...)!=0))

6. TEST 宏忘记 static:
   多个 .c 文件链接时可能符号冲突。

7. fail_count 递增逻辑:
   在 ASSERT 失败时才递增，不是在 TEST 层面递增。

8. test_count 赋值时机:
   在 RUN_TESTS 开始时设为 test_index （已注册数）。

9. 忘记 #include <math.h>:
   test_float 用到了浮点常量，虽然本题不直接调用数学函数但 math.h 是好习惯。

═══════════════════════════════════════
