hint = '''
微型 C 单元测试框架: 用纯 C 宏实现 ASSERT_EQ / ASSERT_STREQ / TEST / RUN_TESTS 。
包含 5 个测试用例 (3 通过, 2 失败): test_add, test_str, test_fail, test_null, test_float 。

═══════════════════════════════════════
背景: 单元测试 (Unit Testing)
═══════════════════════════════════════

单元测试是软件工程中验证最小代码单元（函数）正确性的实践。
成熟的框架（ JUnit 、 pytest 、 Check 、 Unity ）提供断言、测试
发现、报告等功能。本题用纯 C 宏构建一个麻雀虽小五脏俱全的
微型框架，深入理解宏编程和测试运行机制。

测试金字塔（ Testing Pyramid ）:
            ┌─────┐
            │ E2E │  ← 少量端到端测试
           ┌┴─────┴┐
           │  Int. │  ← 中量集成测试
          ┌┴───────┴┐
          │   Unit   │  ← 大量单元测试 (本题)
          └──────────┘

TDD (Test-Driven Development) 红-绿-重构循环:
  RED   → 写一个失败的测试
  GREEN → 写最少代码让测试通过
  REFACTOR → 优化代码结构，测试保持绿色

═══════════════════════════════════════
框架设计: 三个核心组件
═══════════════════════════════════════

1. 断言 (Assertions) — 验证期望值
   ASSERT_EQ(a, b): 比较整数 a 和 b 是否相等
   ASSERT_STREQ(a, b): 比较字符串 a 和 b 是否相等 (含 NULL 处理)

2. 测试用例 (Test Cases) — 组织测试逻辑
   TEST(name) { ... }: 定义一个测试函数，内部调用断言

3. 测试运行器 (Test Runner) — 执行并报告
   RUN_TESTS(): 运行所有注册的测试，打印通过/失败状态和汇总

═══════════════════════════════════════
宏编程关键技巧
═══════════════════════════════════════

A) # 操作符 (Stringification / 字符串化):
   将宏参数转为字符串字面量。
   例: #a  →  "a"
       #hello  →  "hello"
   用于断言失败时打印表达式文本。

B) ## 操作符 (Token Pasting / 记号粘贴):
   将两个记号合并为一个新记号。
   例: test_##add  →  test_add
   用于 TEST(name) 宏生成函数名。

C) do { ... } while(0) 惯用法:
   将多条语句包装成"一条语句"，防止展开后语法问题。
   例:
     if (cond)
       MY_MACRO();  /* 如果 MY_MACRO 展开为多语句会出错 */
     else
       ...
   用 do { ... } while(0) 包装后安全。

D) 参数加括号:
   宏参数必须用 (a) 包裹，防止运算符优先级问题。
   例: #define SQUARE(x) (x)*(x)
       SQUARE(1+2) → (1+2)*(1+2) = 9  ✓
       #define SQUARE_BAD(x) x*x
       SQUARE_BAD(1+2) → 1+2*1+2 = 5  ✗

═══════════════════════════════════════
六个 TODO 引导
═══════════════════════════════════════

TODO 1 — ASSERT_EQ 宏:
