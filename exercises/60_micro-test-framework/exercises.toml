运行: ./test_framework
比对: ./test_framework | diff - expected_output.txt

预期: 5 tests, 2 passed, 3 failed
  - test_add: 全部通过
  - test_str: 全部通过
  - test_fail: ASSERT_EQ(2+2,5) 失败
  - test_null: ASSERT_STREQ(NULL, NULL) 通过, ASSERT_STREQ(NULL, "hello") 失败
  - test_float: ASSERT_EQ((int)3.14, 3) 通过, ASSERT_EQ((int)2.718, 3) 失败
