hint = '''
Sobel 边缘检测: 用 C 语言对固定 8x8 灰度 PGM 图像做 Sobel 边缘检测。
图像包含垂直边、水平边、对角边和均匀区域。

═══════════════════════════════════════
背景: 图像卷积与边缘检测
═══════════════════════════════════════

图像可以表示为二维矩阵 I(x,y), 每个元素是一个像素的灰度值。
"边缘" (edge) 是图像中亮度急剧变化的区域。

卷积 (Convolution):
  用一个小的"核" (kernel, 也叫滤波器) 在图像上滑动,
  在每个位置计算核与图像局部区域的加权和。

  滑动窗口示意图 (3x3 核在 8x8 图像上):

    ┌─────────────────────────────────────┐
    │ I₀₀  I₀₁  I₀₂  I₀₃  I₀₄  I₀₅  I₀₆  I₀₇ │
    │ I₁₀ ┌──────────────────┐ I₁₅  I₁₆  I₁₇ │
    │ I₂₀ │I₂₁ I₂₂ I₂₃ I₂₄ I₂₅│ I₂₆  I₂₇ │  ← 核以(2,3)为中心
    │ I₃₀ │I₃₁ I₃₂ I₃₃ I₃₄ I₃₅│ I₃₆  I₃₇ │     对 5x5 邻域加权求和
    │ I₄₀ │I₄₁ I₄₂ I₄₃ I₄₄ I₄₅│ I₄₆  I₄₇ │     (本题用 3x3 核)
    │ I₅₀ └──────────────────┘ I₅₆  I₅₇ │
    │ I₆₀  I₆₁  I₆₂  I₆₃  I₆₄  I₆₅  I₆₆  I₆₇ │
    │ I₇₀  I₇₁  I₇₂  I₇₃  I₇₄  I₇₅  I₇₆  I₇₇ │
    └─────────────────────────────────────┘

  对中心像素(row,col)的卷积:
    sum = Σ_{i=-1}^{1} Σ_{j=-1}^{1} I[row+i][col+j] * K[i+1][j+1]

  边界像素(第 0 行、第 7 行、第 0 列、第 7 列)没有完整的 3x3 邻域,
  本题中将其梯度幅值设为 0 。

═══════════════════════════════════════
Sobel 算子 (GX 和 GY 保持不变)
═══════════════════════════════════════

Sobel 算子由两个 3x3 核组成:

  Gx (检测垂直边缘/水平梯度):
      ┌          ┐
      │ -1  0  1 │
      │ -2  0  2 │
      │ -1  0  1 │
      └          ┘

  Gy (检测水平边缘/垂直梯度):
      ┌            ┐
      │ -1 -2  -1 │
      │  0  0   0 │
      │  1  2   1 │
      └            ┘

工作原理:
  - Gx 对左右差异敏感: 右侧减左侧, 中间列权重加倍。
    若左侧暗(小值)右侧亮(大值) → Gx > 0 (正梯度, 检测到垂直边缘)
  - Gy 对上下差异敏感: 下方减上方, 中间行权重加倍。
    若上方暗下方亮 → Gy > 0 (正梯度, 检测到水平边缘)

梯度幅值 (Gradient Magnitude):
  G = sqrt(Gx² + Gy²)
  这给出了该像素处边缘"强度"的标量值, 不区分方向。

═══════════════════════════════════════
本题 8x8 图像 (含四种边缘类型)
═══════════════════════════════════════

  Row 0:  50  50 200 200  50  50  50  50
  Row 1:  50  50 200 200  50  50  50  50
  Row 2:  50  50 200 200  50  50  50  50
  Row 3: 200 200 200 200 200 200 200 200
  Row 4: 200 200 200 200 200 200 200 200
  Row 5:  50 200 200 200 200 200 200 200
  Row 6:  50  50  50  50  50  50  50  50
  Row 7:  50  50  50  50  50  50  50  50

图像中的边缘类型:
  1) 垂直边: 行 0-2, 列 1→2 处暗(50)→亮(200)过渡。
     此外列 4→5 处也有亮(200)→暗(50)过渡。
  2) 水平边: 行 2→3 处从混合亮度→全亮(200)。
     行 5→6 处从亮(200)→暗(50)。
  3) 对角边: 行 5 列 0 为暗像素(50), 与周围亮像素(200)
     形成对角方向过渡。
  4) 均匀区: 行 6-7 全为暗(50), 梯度幅值为 0 。

═══════════════════════════════════════
手工计算示例: 像素 (1,1) 处的 Gx 和 Gy
═══════════════════════════════════════

以 (1,1) 为中心的 3x3 邻域 (全为 50):

    [50][50][50]
    [50][50][50]
    [50][50][50]

与 Gx 逐元素相乘: 因为左右相同，正负相消 → Gx = 0
与 Gy 逐元素相乘: 因为上下相同，正负相消 → Gy = 0
G = sqrt(0² + 0²) = 0  ← 均匀区无边缘

再算像素 (1,2) — 垂直边缘处，邻域:

    [50][200][200]
    [50][200][200]
    [50][200][200]

Gx:
  (-1)*50 + 0*200 + 1*200 = 150
  (-2)*50 + 0*200 + 2*200 = 300
  (-1)*50 + 0*200 + 1*200 = 150
  Gx = 600

Gy:
  (-1)*50 + (-2)*200 + (-1)*200 = -650
  0*50 + 0*200 + 0*200 = 0
  1*50 + 2*200 + 1*200 = 650
  Gy = 0 (三行完全相同，无水平变化)

G = sqrt(600² + 0²) = 600 ← 检测到强垂直边缘

再算像素 (2,3) — 水平和垂直边缘交汇处:

    邻域:
    [ 50][200][200]
    [ 50][200][200]
    [200][200][200]

    Gx = (-1)*50 + 0*200 + 1*200
       + (-2)*50 + 0*200 + 2*200
       + (-1)*200 + 0*200 + 1*200 = 450

    Gy = (-1)*50 + (-2)*200 + (-1)*200
       + 0*50 + 0*200 + 0*200
       + 1*200 + 2*200 + 1*200 = 450

    G = sqrt(450² + 450²) = sqrt(405000) ≈ 636

═══════════════════════════════════════
阈值分割 (Thresholding)
═══════════════════════════════════════

梯度幅值计算完毕后, 用阈值将图像二值化:
  - 若 G ≥ 128: 输出 255 (白色, 边缘像素)
  - 若 G < 128: 输出   0 (黑色, 非边缘像素)

梯度值≥128 的像素→255(边缘), 其余→0(非边缘)。

═══════════════════════════════════════
五个 TODO 任务
═══════════════════════════════════════

TODO 1 — print_matrix():
  参数: const char *title, int mat[ROWS][COLS]
  先 printf 打印标题行 (含换行).
  两层 for 循环遍历 mat:
    内层循环中, j>0 时先打印一个空格, 再 printf("%3d", mat[i][j]).
    每行结束后 printf("\n").
  矩阵打印完毕后额外 printf("\n") 输出一个空行.
  输出格式必须逐字符准确 (注意空格和空行), clings 会逐行比对程序 stdout.

TODO 2 — convolve():
  参数: int image[ROWS][COLS], const int kernel[3][3], int row, int col
  声明 int sum = 0.
  用两层 for 循环:
    for (int i = -1; i <= 1; i++)
      for (int j = -1; j <= 1; j++)
        sum += image[row+i][col+j] * kernel[i+1][j+1];
  返回 sum.
  注意 kernel 索引: kernel[i+1][j+1] 将 (-1,1) 映射到 (0,2).

TODO 3 — gradient_magnitude():
  调用 convolve(image, GX, row, col) 得到 gx.
  调用 convolve(image, GY, row, col) 得到 gy.
  返回 (int)(sqrt((double)(gx*gx + gy*gy)) + 0.5).
  注意: gx*gx+gy*gy 需转换为 double 传给 sqrt.
  +0.5 实现四舍五入到最近整数.
  必须 #include <math.h>, 链接时加 -lm.

TODO 4 — threshold():
  一行代码: return (value >= THRESHOLD) ? 255 : 0;
  THRESHOLD 定义为 128.

TODO 5 — main():
  声明 grad_mag[ROWS][COLS] 和 edge_binary[ROWS][COLS].

  Step 1: print_matrix("Original Image:", (int(*)[COLS])IMAGE);
    注意: IMAGE 是 const int[ROWS][COLS], print_matrix 接受 int mat[ROWS][COLS],
    需要强制转换消除 const 限定: (int(*)[COLS])IMAGE

  Step 2: 两层循环遍历所有像素:
    if (i == 0 || i == ROWS-1 || j == 0 || j == COLS-1)
      grad_mag[i][j] = 0;  // 边界像素
    else
      grad_mag[i][j] = gradient_magnitude((int(*)[COLS])IMAGE, i, j);

  Step 3: 两层循环: edge_binary[i][j] = threshold(grad_mag[i][j]);

  Step 4: print_matrix("Gradient Magnitude:", grad_mag);

  Step 5: print_matrix("Edge Map (threshold=128):", edge_binary);

  return 0;

═══════════════════════════════════════
Makefile
═══════════════════════════════════════
填写 5 个变量 (CC/CFLAGS/TARGET/SRC/LDLIBS) +1 条编译命令。
CC=gcc, CFLAGS=-Wall -std=c99, TARGET=sobel, SRC=sobel.c, LDLIBS=-lm
编译命令: $(CC) $(CFLAGS) -o $(TARGET) $(SRC) $(LDLIBS)
注意 -lm 必须放在最后 (链接数学库)。

═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- GX 和 GY 核已提供, 直接使用即可, 不要修改
- IMAGE 数据已提供, 不要修改 (8x8, 含垂直/水平/对角边和均匀区)
- 边界像素 (第 0 行、第 7 行、第 0 列、第 7 列) 没有完整 3x3 邻域, 梯度幅值设为 0
- convolve 的 kernel 索引是 kernel[i+1][j+1], 不是 kernel[i][j]
- sqrt 返回 double, 用 (int)(... + 0.5) 四舍五入
- 链接时必须加 -lm, 且必须放在源文件之后
- print_matrix 的输出格式必须逐字符准确 (构建用 make; 判分/自测用 clings run 或 clings watch; clings tests 68 可查看期望输出)
- IMAGE 是 const, 传给非 const 参数时用 (int(*)[COLS]) 强制转换
- 阈值 128: ≥128→255, <128→0, 用 >= 不是 >
- 每个矩阵后有一个空行 (额外的 \n)
- 输出格式: 每个元素用 %3d, 元素间一个空格, 行末换行
- ROWS=8, COLS=8 (不是之前的 5x5)
'''

