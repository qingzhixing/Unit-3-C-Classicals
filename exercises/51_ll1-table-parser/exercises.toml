hint = '''
LL(1) 预测分析表构造与语法解析：用位掩码迭代计算 FIRST/FOLLOW 集，构建预测分析表，驱动自顶向下解析。

═══════════════════════════════════════
文法定义
═══════════════════════════════════════
  E  → T E'         (产生式 0)
  E' → + T E' | ε   (产生式 1, 2)
  T  → F T'         (产生式 3)
  T' → * F T' | ε   (产生式 4, 5)
  F  → ( E ) | id   (产生式 7, 6)

═══════════════════════════════════════
符号枚举
═══════════════════════════════════════
终结符: id(0) +(1) *(2) ((3) )(4) $(5)
非终结符: E(0) E'(1) T(2) T'(3) F(4)

═══════════════════════════════════════
RHS 编码方案
═══════════════════════════════════════
rhs[p][]: 逆序存储（最右侧符号在索引 0）
值 0~5   → 终结符枚举值
值 100+  → 非终结符 (NT(x) 宏)
值 -1    → 结束标记

═══════════════════════════════════════
位掩码操作
═══════════════════════════════════════
HAS(mask, t): 检查 bit t 是否为 1
ADD(mask, t): 将 bit t 置 1

═══════════════════════════════════════
TODO 1 — token_id(s): 字符串 → 终结符枚举
═══════════════════════════════════════
for i in 0..T_COUNT-1:
  if !strcmp(s, tname[i]): return i
return -1

═══════════════════════════════════════
TODO 2 — 栈操作 (push/pop/empty/stack_str)
═══════════════════════════════════════
push: Sym s = {type, id}; stack[++top_idx] = s
pop:  return stack[top_idx--]
empty: return top_idx < 0
stack_str: 遍历 stack[0..top_idx]，根据 type 选 tname 或 nname 拼接

═══════════════════════════════════════
TODO 3 — compute_first(): 位掩码不动点迭代
═══════════════════════════════════════
初始化 first[] 全为 0

do {
  changed = 0
  for 每个产生式 p:
    A = prod_lhs[p]
    for i = 0 to rhs_len(p)-1:      /* 从左到右遍历 RHS */
      X = rhs_at(p, i)              /* 第 i 个符号 */
      if X 是终结符:
        若 ADD(first[A], X) 改变了 first[A]: changed = 1
        break                       /* 终结符不可空，停止 */
      else:
        X_id = X - 100
        对每个 t: if HAS(first[X_id], t): 若 ADD(first[A], t) 改变了: changed = 1
        if X_id != NT_Ee && X_id != NT_Te: break  /* X 不可空，停止 */
} while (changed)

关键：E' 和 T' 是可空的（它们有 ε 产生式），其他非终结符不可空。

═══════════════════════════════════════
TODO 4 — compute_follow(): 位掩码不动点迭代
═══════════════════════════════════════
初始化 follow[] 全为 0
ADD(follow[NT_E], T_EOF)   /* $ ∈ FOLLOW(E) */

do {
  changed = 0
  for 每个产生式 p:
    A = prod_lhs[p]
    for i = 0 to rhs_len(p)-1:
      X = rhs_at(p, i)
      if X 是终结符: continue     /* 只关心非终结符 */
      B = X - 100

      beta_all_nullable = 1
      for j = i+1 to rhs_len(p)-1:   /* 遍历 B 后面的符号 */
        Y = rhs_at(p, j)
        if Y 是终结符:
          if ADD(follow[B], Y) 改变: changed = 1
          beta_all_nullable = 0; break
        else:
          Y_id = Y - 100
          对每个 t: if HAS(first[Y_id], t): if ADD(follow[B], t) 改变: changed = 1
          if Y_id != NT_Ee && Y_id != NT_Te:
            beta_all_nullable = 0; break

      if beta_all_nullable:
        对每个 t: if HAS(follow[A], t): if ADD(follow[B], t) 改变: changed = 1
} while (changed)

═══════════════════════════════════════
TODO 5 — build_table(): 构建预测分析表
═══════════════════════════════════════
初始化 table[nt][t] 全为 -1

for 每个产生式 p:
  A = prod_lhs[p]
  if rhs_len(p) == 0:    /* ε 产生式 */
    对每个 t: if HAS(follow[A], t): table[A][t] = p
    continue

  nullable_prod = 1
  for i = 0 to rhs_len(p)-1:
    X = rhs_at(p, i)
    if X 是终结符:
      table[A][X] = p; nullable_prod = 0; break
    else:
      X_id = X - 100
      对每个 t: if HAS(first[X_id], t): table[A][t] = p
      if X_id != NT_Ee && X_id != NT_Te:
        nullable_prod = 0; break

  if nullable_prod:
    对每个 t: if HAS(follow[A], t): table[A][t] = p

═══════════════════════════════════════
TODO 6 — print_sets(): 打印 FIRST/FOLLOW 集
═══════════════════════════════════════
使用 set_str(mask, buf) 将位掩码转为字符串，然后 printf。
注意 clings tests 51 展示的期望输出的精确格式（大写、空格、空行）。

═══════════════════════════════════════
TODO 7 — LL(1) 解析主循环
═══════════════════════════════════════
初始化: push($) push(E); ip=0 step=0
循环 while (!empty()):
  获取栈顶 s_top = stack[top_idx]（不 pop！）
  打印当前步骤: stack_str / input_str / printf("[%02d] ...")
  if s_top 是终结符:
    if s_top.id == cur: printf("match %s\n", ...); pop(); ip++
    else: printf("ERROR\n"); return 1
  else (非终结符):
    pid = table[s_top.id][cur]
    if pid < 0: printf("ERROR\n"); return 1
    printf("%s\n", prod_label[pid]); pop()
    遍历 rhs[pid] (i=0 到 -1):
      if rhs[pid][i] >= 100: push(SYM_NONTERM, rhs[pid][i]-100)
      else: push(SYM_TERM, rhs[pid][i])
  step++

循环结束后打印最终状态 + ACCEPT

═══════════════════════════════════════
常见错误
═══════════════════════════════════════
• rhs 是逆序存储的！用 rhs_at(p, i) 获取从左到右的第 i 个符号
• FIRST 迭代中，终结符后要 break（终结符不可空）
• FOLLOW 迭代中，β 全可空时要把 FOLLOW(A) 复制到 FOLLOW(B)
• E' 和 T' 是可空的，其他非终结符不可空
• 构建表时先全填 -1，再按规则填充
• 打印格式必须与 clings tests 51 展示的期望输出精确一致（注意空格对齐）
'''

[[exercises.cases]]
stdout = '''=== LL(1) Table-Driven Parser ===
Grammar: E→TE' E'→+TE'|ε T→FT' T'→*FT'|ε F→id|(E)
Input:   id + id * id

=== FIRST Sets ===
FIRST(E) = {id, (}
FIRST(E') = {+}
FIRST(T) = {id, (}
FIRST(T') = {*}
FIRST(F) = {id, (}

=== FOLLOW Sets ===
FOLLOW(E) = {), $}
FOLLOW(E') = {), $}
FOLLOW(T) = {+, ), $}
FOLLOW(T') = {+, ), $}
FOLLOW(F) = {+, *, ), $}

[00] $E                 id+id*id$        E  → T E'
[01] $E'T               id+id*id$        T  → F T'
[02] $E'T'F             id+id*id$        F  → id
[03] $E'T'id            id+id*id$        match id
[04] $E'T'              +id*id$          T' → ε
[05] $E'                +id*id$          E' → + T E'
[06] $E'T+              +id*id$          match +
[07] $E'T               id*id$           T  → F T'
[08] $E'T'F             id*id$           F  → id
[09] $E'T'id            id*id$           match id
[10] $E'T'              *id$             T' → * F T'
[11] $E'T'F*            *id$             match *
[12] $E'T'F             id$              F  → id
[13] $E'T'id            id$              match id
[14] $E'T'              $                T' → ε
[15] $E'                $                E' → ε
[16] $                  $                match $
[17]                                     ACCEPT
'''
