【预备知识】x86-64 栈帧结构

  每当函数被调用时，CPU 在栈上分配一块内存区域，称为"栈帧"。
  栈帧包含：局部变量、保存的寄存器、返回地址等。
  栈从高地址向低地址增长 (x86-64)。

  典型栈帧布局 (从高地址到低地址):

      高地址 (栈底方向)
      ┌──────────────────────┐
      │  调用者的栈帧         │
      ├──────────────────────┤
      │  返回地址 (8 bytes)   │ ← RIP: 被调用函数返回后执行哪里
      ├──────────────────────┤
      │  保存的 rbp (8 bytes) │ ← 调用者的栈帧基址
      ├──────────────────────┤ ← rbp (frame pointer)
      │  canary (8 bytes)     │ ← Stack protector 哨兵 (可选)
      ├──────────────────────┤
      │  局部变量 / 数组      │ ← 缓冲区通常在这里
      ├──────────────────────┤
      │  callee-saved 寄存器  │ (可选)
      ├──────────────────────┤
      │  函数参数 (第 7 个起)   │ (寄存器传参的前 6 个不在栈上)
      └──────────────────────┘
      低地址 (栈顶方向) ← rsp

  缓冲区溢出本质：向低地址方向的缓冲区写入超过其容量的数据，
                  逐字节覆盖高地址方向的敏感数据 (canary/rbp/ret)。

══════════════════════════════════════════════════════

【代码片段 1】gets() 缓冲区溢出 — 风险等级：CRITICAL

  源代码:
  ┌──────────────────────────────────────────────────┐
  │  void vulnerable_gets(void) {                    │
  │      char buf[16];                               │
  │      gets(buf);  // 危险！无边界检查             │
  │  }                                               │
  └──────────────────────────────────────────────────┘

  栈帧布局分析 (x86-64, 无 canary):

      地址偏移       内容                说明
      ─────────────────────────────────────────────────
      +24           ┌──────────────┐
                    │  返回地址     │ ← gets 溢出可覆盖!
      +16           ├──────────────┤
                    │  保存的 rbp   │
      +0            ├──────────────┤
                    │  buf[0..15]   │ ← gets() 从这里开始写入 (16 bytes)
                    └──────────────┘

      偏移计算:
        buf[0] 到返回地址的距离 = 16 (buf) + 8 (rbp) = 24 字节
        (x86-64: buf 位于 rbp-16, 返回地址位于 rbp+8; buf[16] 已是
         16 字节对齐, 无需额外填充。)

      风险判断：✗ 存在溢出风险
        gets() 从 stdin 读取直到换行符，完全不检查 buf 的大小。
        写满 buf(16)+rbp(8)=24 字节后, 第 25 字节起即可覆盖返回地址。
        这是 C 标准库中最危险的函数之一 (C11 已移除 gets)。

      攻击示意:
        输入：'A' × 24 + 恶意地址 (8 bytes)
              └── 填充 buf+rbp ──┘└─ 覆盖返回地址 ─┘
        结果：函数"返回"到攻击者指定的地址 → 代码执行劫持

══════════════════════════════════════════════════════

【代码片段 2】strcpy() 缓冲区溢出 — 风险等级：HIGH

  源代码:
  ┌──────────────────────────────────────────────────┐
  │  void vulnerable_strcpy(char *src) {             │
  │      char buf[32];                               │
  │      strcpy(buf, src);  // 危险！不检查边界      │
  │  }                                               │
  └──────────────────────────────────────────────────┘

  栈帧布局分析 (x86-64, 无 canary):

      地址偏移       内容                说明
      ─────────────────────────────────────────────────
      +40           ┌──────────────┐
                    │  返回地址     │ ← strcpy 溢出可覆盖!
      +32           ├──────────────┤
                    │  保存的 rbp   │
      +0            ├──────────────┤
                    │  buf[0..31]   │ ← strcpy() 从这里开始写入
                    └──────────────┘

      偏移计算:
        buf[0] 到返回地址的距离 = 32 (buf) + 8 (rbp) = 40 字节
        (32 字节已对齐到 16 字节，不需要额外填充)

      风险判断：✗ 存在溢出风险
        strcpy() 拷贝直到遇到 '\0'，不检查目标缓冲区大小。
        若 src 长度 ≥ 32，则会覆盖 rbp 和返回地址。
        风险略低于 gets(): 攻击者需要控制 src 的内容和长度，
        且 '\0' 字节可能限制某些攻击载荷。

      gets vs strcpy 溢出对比:
        ┌──────────┬──────────────┬──────────────┐
        │ 函数     │ 输入源        │ 终止条件     │
        ├──────────┼──────────────┼──────────────┤
        │ gets()   │ stdin (交互)  │ 换行符 '\n' │
        │ strcpy() │ 字符串参数    │ 空字符 '\0' │
        └──────────┴──────────────┴──────────────┘

══════════════════════════════════════════════════════

【代码片段 3】fgets() 安全版本 — 风险等级：SAFE

  源代码:
  ┌──────────────────────────────────────────────────┐
  │  void safe_fgets(void) {                         │
  │      char buf[16];                               │
  │      fgets(buf, sizeof(buf), stdin);  // 安全！  │
  │  }                                               │
  └──────────────────────────────────────────────────┘

  栈帧布局分析 (x86-64, 无 canary):

      地址偏移       内容                说明
      ─────────────────────────────────────────────────
      +24           ┌──────────────┐
                    │  返回地址     │ ← fgets 无法到达!
      +16           ├──────────────┤
                    │  保存的 rbp   │ ← fgets 无法到达!
      +0            ├──────────────┤
                    │  buf[0..15]   │ ← fgets 最多写 15+1 字节 (16 bytes)
                    └──────────────┘

      偏移计算:
        buf[0] 到返回地址的距离 = 16 (buf) + 8 (rbp) = 24 字节
        fgets(buf, 16, stdin) 最多读入 15 个字符 + '\0'
        → 最多写入 buf[0..15]，无法触及返回地址区域

      风险判断：✓ 安全 (在正确使用 sizeof 的前提下)
        fgets 接受最大长度参数，保证不会越界写入。
        注意：若程序员错误地传入大于实际缓冲区的 size，
              仍可能溢出。正确做法：fgets(buf, sizeof(buf), stdin)

      fgets 安全机制:
        1. 第 2 个参数指定最多读取 (size-1) 个字符
        2. 总是以 '\0' 结尾 (若 size > 0)
        3. 遇到换行符或 EOF 也会停止
        4. 不会写入超过 size 字节的数据

