【深入分析】金丝雀 (Stack Canary) 防护原理

  名称由来:
    煤矿工人下矿时携带金丝雀。金丝雀对瓦斯 (一氧化碳) 极为敏感，
    一旦金丝雀死亡，矿工就知道有毒气泄漏，立即撤离。
    类似地，stack canary 是栈上的"哨兵"——一旦被覆盖，
    程序就知道发生了缓冲区溢出，立即终止。

  带 Canary 的栈帧布局:

      地址偏移       内容                说明
      ─────────────────────────────────────────────
      +32           ┌──────────────┐
                    │  返回地址     │ ← 攻击者的最终目标
      +24           ├──────────────┤
                    │  保存的 rbp   │
      +16           ├──────────────┤
                    │  CANARY       │ ← ★ 哨兵值 (8 bytes)
      +0            ├──────────────┤
                    │  buf[0..15]   │ ← 溢出从这里开始 (16 bytes)
                    └──────────────┘

  Canary 工作流程:

    函数入口:
      1. 从 TLS (Thread-Local Storage) 读取随机 canary 值
         x86-64: mov rax, QWORD PTR fs:0x28
      2. 将 canary 写入栈帧 (rbp-8 位置)

    函数返回前:
      3. 从栈帧读取 canary 值
      4. 与 TLS 中的原始值比较 (xor 指令)
      5. 若相同 → 正常返回 (ret)
      6. 若不同 → 调用 __stack_chk_fail() → 程序终止

  Canary 特征:
    • 随机值 — 每次程序运行都不同 (防止固定值猜测)
    • 最低字节为 \0 (NULL) — 阻止通过字符串函数泄露
      因为 strcpy/gets 遇到 \0 会停止拷贝
    • 存储在 TLS (fs:0x28 on x86-64, gs:0x14 on x86)
    • GCC 编译选项：-fstack-protector / -fstack-protector-strong

  Canary 的局限性:
    1. 信息泄露：若攻击者能先读取 canary 值，可构造精确覆盖
       (Format string 漏洞可泄露栈内容)
    2. 非连续覆盖：canary 只能检测顺序溢出，无法检测
       直接写入返回地址的漏洞 (如任意地址写)
    3. 暴力破解：fork 出的子进程 canary 相同，
       攻击者可逐字节暴力猜测 (耗时但可行)
    4. 不覆盖返回地址：覆盖函数指针、数据指针等其他目标
       可能绕过 canary 保护

  绕过 Canary 的方法:
    a) 信息泄露 + 精确覆盖：先泄露 canary 值，写入时原样放回
    b) 改写 GOT 表：不碰 canary，直接覆盖全局偏移表
    c) 覆盖局部变量：修改函数指针或关键判断变量
    d) 逐字节暴力破解：fork 服务器场景下 canary 不变

══════════════════════════════════════════════════════

【防护机制对比】纵深防御体系

  现代操作系统采用多层防护 (Defense in Depth)，
  每层防护针对不同攻击阶段:

  ┌──────────────┬──────────────┬────────────────────────┬──────────────────┐
  │ 防护机制      │ 防护目标      │ 原理                   │ 局限性            │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ Stack Canary │ 栈缓冲区溢出  │ 返回地址前放随机哨兵值   │ 信息泄露可绕过    │
  │              │ 检测          │ 返回前检查是否被修改     │ 不保护数据指针    │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ ASLR         │ 代码复用攻击  │ 随机化栈/堆/库/代码段    │ 信息泄露可绕过    │
  │              │ (ROP/JOP)    │ 基地址，使地址不可预测    │ 熵不足 (32-bit)  │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ DEP / NX-bit │ 代码注入攻击  │ 标记数据页不可执行       │ ROP 可绕过       │
  │              │ (shellcode)  │ 栈/堆不能同时写 + 执行     │ JIT 需要可执行堆  │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ RELRO        │ GOT 表覆写   │ 重定位表只读            │ 不保护栈溢出     │
  │              │ 攻击          │ 延迟绑定的 PLT 仍可写    │ Partial RELRO    │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ PIE          │ 代码段固定    │ 可执行文件编译为         │ 轻微性能开销     │
  │              │ 地址攻击      │ 位置无关代码             │ 需 ASLR 配合     │
  ├──────────────┼──────────────┼────────────────────────┼──────────────────┤
  │ FORTIFY      │ 不安全库函数  │ 编译时替换为带边界        │ 需源码重编译     │
  │ _SOURCE      │ 调用          │ 检查的版本 (__chk)      │ 不能检测所有情况  │
  └──────────────┴──────────────┴────────────────────────┴──────────────────┘

  纵深防御示意:

    攻击者 ──→ [Canary] ──→ [ASLR] ──→ [DEP/NX] ──→ [RELRO] ──→ 目标
               第 1 层       第 2 层      第 3 层        第 4 层
              (检测溢出)  (隐藏地址)  (阻止执行)   (保护 GOT)

  绕过所有防护需要：信息泄露 + ROP 链 + GOT 覆写 → 攻击复杂度极高

══════════════════════════════════════════════════════

【综合风险评估】

  ┌─────────────────┬──────────┬──────────────────────────────┐
  │ 代码片段         │ 风险等级  │ 原因                         │
  ├─────────────────┼──────────┼──────────────────────────────┤
  │ 片段 1: gets()   │ CRITICAL │ 无任何边界检查               │
  │                 │          │ 攻击者通过 stdin 直接控制     │
  │                 │          │ C11 标准已移除该函数          │
  ├─────────────────┼──────────┼──────────────────────────────┤
  │ 片段 2: strcpy() │ HIGH     │ 无边界检查                   │
  │                 │          │ 需控制 src 内容 (含 \0 限制) │
  │                 │          │ 广泛存在于遗留代码中          │
  ├─────────────────┼──────────┼──────────────────────────────┤
  │ 片段 3: fgets()  │ SAFE     │ 显式指定最大长度              │
  │                 │          │ 正确使用 sizeof 即可保证安全  │
  │                 │          │ 推荐作为标准输入的首选函数    │
  └─────────────────┴──────────┴──────────────────────────────┘

  【安全编程准则】

  1. 永远使用带边界检查的函数:
     替代 gets()   → fgets(buf, sizeof(buf), stdin)
     替代 strcpy() → strncpy(buf, src, sizeof(buf)-1); buf[sizeof(buf)-1]='\0';
     替代 sprintf()→ snprintf(buf, sizeof(buf), fmt, ...)
     替代 strcat() → strncat(buf, src, sizeof(buf)-strlen(buf)-1);

  2. 编译时启用安全选项:
     gcc -fstack-protector-strong  (启用栈保护)
     gcc -D_FORTIFY_SOURCE=2       (启用 fortified 函数)
     gcc -fPIE -pie                (位置无关可执行文件)
     gcc -Wformat -Wformat-security (格式字符串检查)

  3. 永远不要假设输入数据的长度是安全的
  4. 理解栈帧布局有助于写出更安全的代码
  5. 代码审查时特别关注：gets, strcpy, strcat, sprintf, scanf("%s")

