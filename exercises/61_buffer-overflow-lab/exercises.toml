【进一步学习建议】

  1. 动手实验:
     在 Linux 上用 -fno-stack-protector 编译并运行溢出代码
     $ gcc -fno-stack-protector -z execstack -o vuln vuln.c
     观察不同输入长度对程序行为的影响 (崩溃 vs 劫持)

  2. 工具使用:
     objdump -d overflow_lab  → 查看反汇编和栈帧布局
     checksec --file=overflow_lab  → 查看启用的安全特性
     gdb ./overflow_lab → 设置断点，观察运行时栈布局

  3. 标准与规范:
     CWE-120: Buffer Copy without Checking Size of Input
     CWE-121: Stack-based Buffer Overflow
     CERT C: STR31-C (Guarantee storage for strings)
     MISRA C: Rule 21.6 (禁止使用 gets)

  4. 现代编译器默认安全选项:
     GCC ≥6: -fstack-protector-strong 默认开启
     Clang ≥5: -fstack-protector-strong 默认开启
     glibc ≥2.16: gets 声明标记为 deprecated
     C11: gets 从标准中移除

  5. 相关阅读:
     Smashing The Stack For Fun And Profit (Aleph One, 1996)
     StackGuard: Automatic Adaptive Detection of Buffer Overflow (1998)
     The Geometry of Innocent Flesh on the Bone (Shacham, 2007, ROP)

