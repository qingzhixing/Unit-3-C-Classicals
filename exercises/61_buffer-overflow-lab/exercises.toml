hint = '''
缓冲区溢出安全分析实验: 给定 3 段 C 代码片段，画栈帧图、计算偏移、判断风险、讲解 canary 。

═══════════════════════════════════════
背景: 缓冲区溢出 (Buffer Overflow)
═══════════════════════════════════════

缓冲区溢出是 C 语言中最古老、最著名的安全漏洞。 1988 年的 Morris 蠕虫
利用 fingerd 的 gets()溢出传播， 1996 年 Aleph One 在 Phrack 上发表
"Smashing The Stack For Fun And Profit"系统阐述了栈溢出利用技术。
此后 30 余年，缓冲区溢出一直是 CWE Top 25 的常客。

本题不是让学生实际执行溢出攻击（那是 CTF 的内容），而是进行
"安全分析"——理解为什么某段代码有溢出风险，栈帧在内存中
如何布局，偏移量如何计算，以及现代防护机制（特别是 canary ）
如何检测和阻止溢出。

═══════════════════════════════════════
核心概念: 栈帧 (Stack Frame) 内存布局
═══════════════════════════════════════

每次函数调用时， CPU 在栈上分配一个"栈帧"，包含:

  高地址 (栈底方向)
  ┌──────────────────────┐
  │  调用者的栈帧         │
  ├──────────────────────┤
  │  返回地址 (8 bytes)   │ ← RIP: 被调用函数返回后执行的地址
  ├──────────────────────┤
  │  保存的 rbp (8 bytes) │ ← 调用者的栈帧基址指针
  ├──────────────────────┤ ← rbp (frame pointer)
  │  canary (8 bytes)     │ ← 栈哨兵 (如启用 -fstack-protector)
  ├──────────────────────┤
  │  局部变量 / 数组      │ ← 缓冲区在这里 (buf[0], buf[1], ...)
  ├──────────────────────┤
  │  callee-saved 寄存器  │ (可选，编译器决定)
  ├──────────────────────┤
  │  函数参数 (第 7 个起)   │ (x86-64 前 6 个参数用寄存器传递)
  └──────────────────────┘
  低地址 (栈顶方向) ← rsp

关键事实:
- 栈从高地址向低地址增长 (x86/x86-64)
- 数组索引从低地址向高地址增长 (buf[0]在最低地址)
- 因此: 向 buf[N]越界写入 → 向高地址方向覆盖 → 覆盖 canary/rbp/返回地址

缓冲区溢出本质:
  向低地址方向的缓冲区写入超过其容量的数据，
  逐字节覆盖高地址方向的敏感数据。

═══════════════════════════════════════
溢出机制详解: 偏移量计算
═══════════════════════════════════════

对于 char buf[N] 作为函数第一个（或唯一）局部变量 (x86-64, -O0 常见布局):

  偏移量 = N + (8 若启用 canary) + 8(rbp)

具体例子:
  char buf[16] (无 canary):
    偏移 = 16(buf) + 8(rbp) = 24 字节
    (x86-64: buf 位于 rbp-16, 返回地址位于 rbp+8; buf[16] 已 16 字节对齐,
     无需额外填充)

  char buf[32] (无 canary):
    偏移 = 32(buf) + 8(rbp) = 40 字节 (32 已对齐 16 字节)

  char buf[16] (有 canary):
    偏移 = 16(buf) + 8(canary) + 8(rbp) = 32 字节

说明: 精确偏移随编译器版本/优化级别而变, 生产中应用 objdump/gdb 确认;
      本题按上述 -O0 常见布局取值。

溢出攻击需要: 填充字节数 = 偏移量 + 目标地址 (8 字节)
例如 (buf[16] 无 canary): 'A' × 24 + 恶意地址 → 覆盖返回地址

═══════════════════════════════════════
金丝雀 (Stack Canary) 防护原理
═══════════════════════════════════════

名称由来:
  煤矿工人带金丝雀下矿。金丝雀对一氧化碳敏感，
  若金丝雀死亡 → 矿工知道有毒气 → 立即撤离。
  类似地， canary 在栈上作为"哨兵"——被覆盖即告警。

带 Canary 的栈帧:
  高地址
  ┌──────────────┐
  │  返回地址     │ ← 攻击者最终目标
  ├──────────────┤
  │  保存的 rbp   │
  ├──────────────┤
  │  CANARY ★     │ ← 哨兵值 (8 bytes, 最低字节为\0)
  ├──────────────┤
  │  buf[0..15]   │ ← 溢出从这里开始 (16 bytes)
  └──────────────┘
  低地址

Canary 工作流程:
  函数入口:
    1. 从 TLS 读取随机 canary (x86-64: mov rax, fs:0x28)
    2. 写入栈帧 (rbp-8 位置)
  函数返回前:
    3. 从栈帧读取 canary
    4. 与 TLS 原始值异或比较
    5. 相同 → 正常返回 (ret)
    6. 不同 → __stack_chk_fail() → 程序终止

Canary 特征:
  - 随机值 (每次运行不同)
  - 最低字节 \0 (阻止字符串函数泄露，因为 strcpy 遇到\0 停止)
  - 存储在 TLS (Thread-Local Storage)
  - GCC: -fstack-protector / -fstack-protector-strong / -fstack-protector-all

Canary 局限性:
  1. 信息泄露: 若能先读取 canary 值，可精确覆盖
  2. 非连续覆盖: 只能检测顺序溢出，不能检测直接写入
  3. 暴力破解: fork 子进程 canary 相同，可逐字节猜测
  4. 不保护其他目标: 函数指针、数据指针、 GOT 表等

绕过 Canary 的方法:
  a) 信息泄露 + 精确覆盖
  b) 改写 GOT 表 (不碰 canary)
  c) 覆盖局部变量 (函数指针或关键判断)
  d) 逐字节暴力破解 (fork 场景)

═══════════════════════════════════════
防护机制对比: 纵深防御 (Defense in Depth)
═══════════════════════════════════════

| 防护机制         | 防护目标       | 原理                     | 局限性            |
|-----------------|---------------|-------------------------|-------------------|
| Stack Canary    | 栈溢出检测     | 返回地址前放随机哨兵      | 信息泄露可绕过     |
| ASLR            | 代码复用攻击   | 随机化地址空间基址        | 信息泄露/熵不足    |
| DEP/NX-bit      | 代码注入攻击   | 数据页不可执行           | ROP 可绕过         |
| RELRO           | GOT 覆写攻击   | 重定位表只读             | Partial RELRO     |
| PIE             | 固定地址攻击   | 可执行文件位置无关        | 需 ASLR 配合        |
| FORTIFY_SOURCE  | 不安全库函数   | 编译时替换带边界检查版本  | 需源码重编译       |

纵深防御: 多层防护链
  攻击者 → [Canary] → [ASLR] → [DEP/NX] → [RELRO] → 目标
            第 1 层      第 2 层     第 3 层       第 4 层
           (检测)     (隐藏)    (阻止执行)   (保护 GOT)

═══════════════════════════════════════
三个代码片段的风险对比
═══════════════════════════════════════

| 代码片段          | 风险等级   | 原因                             |
|------------------|-----------|----------------------------------|
| gets(buf)        | CRITICAL  | 无边界检查，通过 stdin 直接控制     |
| strcpy(buf,src)  | HIGH      | 无边界检查，依赖 src 长度          |
| fgets(buf,N,stdin)| SAFE     | 显式指定最大长度，正确使用即安全  |

gets() 已被 C11 标准移除，任何使用 gets()的代码都应立即修复。

