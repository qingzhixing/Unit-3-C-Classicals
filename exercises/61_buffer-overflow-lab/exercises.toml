═══════════════════════════════════════
常见错误
═══════════════════════════════════════

1. 偏移量想当然:
   精确偏移取决于编译器/优化级别，别硬套公式。x86-64 -O0 下一个单独的
   char buf[16] 通常位于 rbp-16、返回地址在 rbp+8，即 24 字节；一旦加上
   canary、其它局部变量或换优化级别，布局就会变。
   正确做法: 用 objdump -d / gdb 看真实偏移，不要凭空假设"必然要对齐填充"。

2. 栈增长方向搞反:
   栈向低地址增长，但数组向高地址增长
   溢出时覆盖的是高地址方向的内容

3. canary 位置放错:
   canary 在 rbp 之下、局部变量之上
   不是在返回地址之上

4. fgets 参数理解错误:
   fgets(buf, N, stdin) 最多读 N-1 个字符
   第 N 个字节是'\0'，不是读 N 个字符

5. sizeof 用错:
   fgets(buf, sizeof(buf), stdin) ← 正确
   fgets(buf, 16, stdin) ← 正确但硬编码
   fgets(buf, 256, stdin) ← 若 buf 是 char[16]则溢出!

6. 混淆 strncpy 和 strcpy:
   strncpy 不保证'\0'结尾 (若 src 长度≥n)
   安全用法: strncpy(buf, src, sizeof(buf)-1); buf[sizeof(buf)-1]='\0';

