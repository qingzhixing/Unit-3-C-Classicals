hint = '''
无锁环形缓冲区: C11 _Atomic + SPSC 设计。

═══════════════════════════════════════
背景: 什么是无锁编程？
═══════════════════════════════════════

传统多线程同步使用互斥锁(mutex):
  lock(&mutex);
  // critical section
  unlock(&mutex);

锁的问题:
  - 阻塞: 一个线程持锁时, 其他线程等待(上下文切换开销)
  - 死锁: 多个锁的获取顺序不当导致永久等待
  - 优先级反转: 低优先级线程持锁阻塞高优先级线程
  - 性能瓶颈: 高竞争时吞吐量急剧下降

无锁编程(lock-free)使用原子操作(atomic operations)实现
线程间同步, 无需互斥锁。 CPU 提供硬件原语(CAS, FAA, LL/SC),
C11 通过 <stdatomic.h> 提供了标准化的原子类型和操作。

═══════════════════════════════════════
SPSC 环形缓冲区原理
═══════════════════════════════════════

SPSC = Single Producer Single Consumer
(单生产者单消费者)

环形缓冲区结构:
  ┌───┬───┬───┬───┬───┬───┬───┬───┐
  │ 0 │ 1 │ 2 │ 3 │ 4 │ 5 │ 6 │ 7 │  ← 容量 8
  └───┴───┴───┴───┴───┴───┴───┴───┘
    ↑                       ↑
  read_idx               write_idx

两个原子索引:
  write_idx: 生产者已写入的元素总数(单调递增, 不取模)
  read_idx:  消费者已读取的元素总数(单调递增, 不取模)

实际槽位 = idx % BUFFER_SIZE

关键不变量:
  - 可写槽位数 = BUFFER_SIZE - (write_idx - read_idx)
  - 可读槽位数 = write_idx - read_idx
  - 满: write_idx - read_idx == BUFFER_SIZE  (生产者等待)
  - 空: write_idx == read_idx               (消费者等待)

═══════════════════════════════════════
内存顺序 (memory_order)
═══════════════════════════════════════

C11 定义了 6 种内存顺序, 本题使用 3 种:

┌────────────────────┬──────────────────────────────────────┐
│ memory_order       │ 含义                                 │
├────────────────────┼──────────────────────────────────────┤
│ memory_order_relaxed │ 只保证原子性, 不保证顺序。          │
│                    │ 用于: 计数器、标志位(不依赖其他数据)  │
├────────────────────┼──────────────────────────────────────┤
│ memory_order_acquire │ 后续读写不会被重排到此操作之前。    │
│                    │ 用于: 加载共享标志(消费者读 write_idx)│
├────────────────────┼──────────────────────────────────────┤
│ memory_order_release │ 之前的读写不会被重排到此操作之后。  │
│                    │ 用于: 发布数据(生产者更新 write_idx)  │
└────────────────────┴──────────────────────────────────────┘

acquire-release 配对:
  生产者: store(data, relaxed) → store(write_idx, release)
  消费者: load(write_idx, acquire) → load(data, relaxed)

这构成了 happens-before 关系:
  生产者写入数据 → 生产者发布索引 → 消费者获取索引 → 消费者读取数据
  保证消费者看到的是完整写入的数据, 不会读到半写状态。

═══════════════════════════════════════
缓存行伪共享 (False Sharing)
═══════════════════════════════════════

CPU 缓存以缓存行(cache line, 通常 64 字节)为单位操作。
当两个变量位于同一缓存行, 一个核心修改其中变量时,
整个缓存行在其他核心上失效。

伪共享问题:
  write_idx 和 read_idx 如果相邻声明:
  ┌─────────────────────────────────┐
  │ write_idx(4B) │ read_idx(4B)  │ ← 同一 64B 缓存行
  └─────────────────────────────────┘
  生产者更新 write_idx → 消费者缓存行失效(反之亦然)!
  即使它们从不访问对方的变量!

缓解方案:
  - 用 alignas(64) 将两个索引放在不同缓存行
  - 或在索引之间填充 padding[60] 字节
  - SPSC 场景下伪共享影响较小(只有两个线程),
    但在 MPMC 场景下可能严重降低吞吐量

═══════════════════════════════════════
Makefile (4 个变量 + 3 条规则)
═══════════════════════════════════════

