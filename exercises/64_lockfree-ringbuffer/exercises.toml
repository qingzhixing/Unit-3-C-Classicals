  clean:            → rm -f $(TARGET)

═══════════════════════════════════════
C 代码 — 5 个 TODO 区 (~55 行)
═══════════════════════════════════════

数据结构(已提供):
  static _Atomic int buffer[BUFFER_SIZE];
  static _Atomic int write_idx = 0;
  static _Atomic int read_idx  = 0;

TODO 1 — init_buffer():
  将所有 buffer 槽位初始化为 -1 (哨兵值，表示空)。
  重置 write_idx 和 read_idx 为 0 。

TODO 2 — print_buffer(label):
  遍历 buffer 读取每个槽位。值 >= 0 打印数字，否则打印 "."。
  格式: "[label] buf=[. . 2 3 4 . . .]"

TODO 3 — producer_write(value):
  忙等待直到缓冲区非满 (write_idx - read_idx < BUFFER_SIZE)。
  写入 value 到 buffer[write_idx % BUFFER_SIZE]。
  打印操作信息后发布递增的 write_idx 。

TODO 4 — consumer_read():
  忙等待直到缓冲区非空 (read_idx < write_idx)。
  从 buffer[read_idx % BUFFER_SIZE] 读取值，标记槽位为 -1 。
  打印操作信息后发布递增的 read_idx ，返回读取的值。

TODO 5 — main():
  按交错时间线执行：生产 5 个 → 消费 3 个 → 生产 5 个 (回绕!) → 消费 7 个。
  输出最终结果： Produced/Consumed 序列、最终索引、缓冲区是否为空。

═══════════════════════════════════════
交错时间线追踪
═══════════════════════════════════════

初始: write_idx=0, read_idx=0, buffer=[. . . . . . . .]

Phase 1 — 生产 5 个 (0..4):
  P 写 0@槽 0 → w=1 r=0 buf=[0 . . . . . . .]
  P 写 1@槽 1 → w=2 r=0 buf=[0 1 . . . . . .]
  P 写 2@槽 2 → w=3 r=0 buf=[0 1 2 . . . . .]
  P 写 3@槽 3 → w=4 r=0 buf=[0 1 2 3 . . . .]
  P 写 4@槽 4 → w=5 r=0 buf=[0 1 2 3 4 . . .]

Phase 2 — 消费 3 个 (0..2):
  C 读 0@槽 0 → w=5 r=1 buf=[. 1 2 3 4 . . .]
  C 读 1@槽 1 → w=5 r=2 buf=[. . 2 3 4 . . .]
  C 读 2@槽 2 → w=5 r=3 buf=[. . . 3 4 . . .]

Phase 3 — 生产 5 个 (5..9):
  P 写 5@槽 5 → w=6 r=3 buf=[. . . 3 4 5 . .]
  P 写 6@槽 6 → w=7 r=3 buf=[. . . 3 4 5 6 .]
  P 写 7@槽 7 → w=8 r=3 buf=[. . . 3 4 5 6 7]
  P 写 8@槽 0 → w=9 r=3 buf=[8 . . 3 4 5 6 7]  ← 回绕!
  P 写 9@槽 1 → w=10 r=3 buf=[8 9 . 3 4 5 6 7] ← 回绕!

Phase 4 — 消费 7 个 (3..9):
  C 读 3@槽 3 → w=10 r=4 buf=[8 9 . . 4 5 6 7]
  C 读 4@槽 4 → w=10 r=5 buf=[8 9 . . . 5 6 7]
  C 读 5@槽 5 → w=10 r=6 buf=[8 9 . . . . 6 7]
  C 读 6@槽 6 → w=10 r=7 buf=[8 9 . . . . . 7]
  C 读 7@槽 7 → w=10 r=8 buf=[8 9 . . . . . .]
  C 读 8@槽 0 → w=10 r=9 buf=[. 9 . . . . . .]
  C 读 9@槽 1 → w=10 r=10 buf=[. . . . . . . .]

最终: write_idx=10, read_idx=10, 缓冲区空。

═══════════════════════════════════════
关键提示
═══════════════════════════════════════
- #include <stdatomic.h> 是必需的，提供 _Atomic 和 atomic_store/load_explicit
- 索引值永远递增(不取模), 只在访问 buffer[] 时用 % BUFFER_SIZE
- 满判断: write_idx - read_idx >= BUFFER_SIZE
- 空判断: read_idx >= write_idx (即 write_idx == read_idx)
- 生产者的 acquire 读 read_idx 确保看到消费者最新的释放
- 消费者的 acquire 读 write_idx 确保看到生产者最新的释放
- print_buffer 中 -1 打印 "." (点), >=0 打印数字
- 消费后把槽位标记回 -1 (空), 否则打印输出不正确
- 使用 atomic_store_explicit 和 atomic_load_explicit, 不要直接用 = 赋值
- 参考: README.md 中的环形缓冲区结构图和原子操作对比表
'''

